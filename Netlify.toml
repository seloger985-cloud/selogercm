[[redirects]]
  from = "/share/*"
  to = "/.netlify/functions/og"
  status = 200
  force = true

[[headers]]
  for = "/share/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/og-image/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    X-Robots-Tag = "noindex"
