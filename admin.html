<!DOCTYPE html>
<html lang="fr">
<head>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Connexion Admin — SE LOGER CM</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="assets/css/style.css" />
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #f4f4f4;
      font-family: 'Poppins', sans-serif;
    }
    .login-box {
      background: #fff;
      padding: 2.5rem;
      border-radius: 1rem;
      box-shadow: 0 6px 20px rgba(0,0,0,0.15);
      width: 350px;
      text-align: center;
    }
    h1 {
      margin-bottom: 1rem;
      color: var(--orange);
    }
    input {
      width: 100%;
      padding: 0.8rem;
      border: 1px solid #ddd;
      border-radius: 10px;
      margin-bottom: 1rem;
      font-size: 1rem;
    }
    button {
      width: 100%;
      padding: 0.9rem;
      border: none;
      border-radius: 10px;
      background: var(--orange);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
      transition: 0.3s;
    }
    button:hover {
      opacity: 0.9;
    }
    .error {
      color: red;
      margin-top: 0.5rem;
      font-size: 0.9rem;
    }
  </style>

  new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],

  })(window,document,'script','dataLayer','GTM-WVWKFVTF');</script>

</head>
<body>
  <!-- Google Tag Manager (noscript) -->
  <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-WVWKFVTF"
  height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
  <!-- End Google Tag Manager (noscript) -->
  <div class="login-box">
    <h1>Connexion Admin</h1>
    <form id="loginForm">
      <input type="text" id="username" placeholder="Identifiant" required />
      <input type="password" id="password" placeholder="Mot de passe" required />
      <button type="submit">Se connecter</button>
      <p class="error" id="errorMsg"></p>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="assets/js/supabase.js"></script>
  <script src="assets/js/auth.js"></script>
  <script>
    const form = document.getElementById("loginForm");
    const errorMsg = document.getElementById("errorMsg");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();

      const submitBtn = form.querySelector("button[type=submit]");
      submitBtn.disabled = true;
      submitBtn.textContent = "Connexion…";
      errorMsg.textContent = "";

      try {
        const ok = await SLCM.loginAdmin(username, password);
        if (ok) {
          window.location.href = "/admin_dashboard";
        } else {
          errorMsg.textContent = "Identifiants incorrects. Veuillez réessayer.";
        }
      } catch (err) {
        errorMsg.textContent = "Erreur de connexion. Réessayez.";
        console.error("[Admin] login error:", err);
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "Se connecter";
      }
    });
  </script>
  <script src="assets/js/nav.js"></script>
</body>
</html>
