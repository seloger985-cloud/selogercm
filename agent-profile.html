<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <title>Modération Agents — SE LOGER CM</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
    :root { --orange:#ff7a00; --dark:#111; --gray:#f6f7f9; }
    * { box-sizing:border-box; }
    body { background:var(--gray); font-family:'Poppins',sans-serif; }
    main { padding-top:90px; padding-bottom:60px; min-height:100vh; }
    .wrap { max-width:1100px; margin:auto; padding:0 1.2rem; }

    /* ── Topbar ── */
    .page-head { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:1rem; margin-bottom:1.5rem; }
    .page-head h1 { font-size:1.5rem; font-weight:900; color:var(--dark); }
    .page-head h1 span { color:var(--orange); }

    /* ── Stats ── */
    .stats-row { display:grid; grid-template-columns:repeat(auto-fill,minmax(130px,1fr)); gap:10px; margin-bottom:1.5rem; }
    .stat-card { background:#fff; border-radius:14px; padding:1rem; box-shadow:0 4px 14px rgba(0,0,0,.05); border-left:4px solid #eee; text-align:center; }
    .stat-card .num { font-size:1.7rem; font-weight:900; }
    .stat-card .lbl { font-size:.72rem; color:#888; font-weight:600; margin-top:2px; }

    /* ── Filters ── */
    .filters-bar { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:1.2rem; align-items:center; }
    .filters-bar input { padding:.5rem .9rem; border:1.5px solid #e5e5e5; border-radius:10px; font-family:inherit; font-size:.85rem; background:#fff; min-width:200px; }
    .filters-bar input:focus { outline:none; border-color:var(--orange); }
    .filter-pill { padding:.4rem .9rem; border-radius:999px; border:1.5px solid #e5e5e5; background:#fff; font-family:inherit; font-size:.78rem; font-weight:700; cursor:pointer; color:#666; transition:all .15s; }
    .filter-pill.active { background:var(--dark); color:#fff; border-color:var(--dark); }

    /* ── Agent grid ── */
    .agent-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:14px; }

    /* ── Agent card ── */
    .agent-card { background:#fff; border-radius:16px; box-shadow:0 4px 16px rgba(0,0,0,.07); overflow:hidden; transition:transform .2s; }
    .agent-card:hover { transform:translateY(-2px); }
    .agent-card.is-suspended { opacity:.65; border:2px solid #fecaca; }

    .agent-head { display:flex; align-items:center; gap:12px; padding:14px 16px 10px; }
    .agent-avatar { width:48px; height:48px; border-radius:50%; background:#f0f0f0; flex-shrink:0; overflow:hidden; display:flex; align-items:center; justify-content:center; font-size:1.4rem; }
    .agent-avatar img { width:100%; height:100%; object-fit:cover; }
    .agent-name { font-weight:800; font-size:.95rem; color:var(--dark); line-height:1.2; }
    .agent-phone { font-size:.75rem; color:#888; margin-top:2px; }

    .agent-badges { display:flex; gap:5px; flex-wrap:wrap; padding:0 16px 10px; }
    .badge { display:inline-flex; align-items:center; gap:3px; padding:.18rem .55rem; border-radius:999px; font-size:.68rem; font-weight:800; }
    .badge-verified  { background:#dcfce7; color:#16a34a; }
    .badge-pending   { background:#dbeafe; color:#1d4ed8; }
    .badge-rejected  { background:#fee2e2; color:#dc2626; }
    .badge-none      { background:#f3f4f6; color:#888; }
    .badge-pro       { background:#fef3c7; color:#92400e; }
    .badge-suspended { background:#fee2e2; color:#dc2626; }

    .agent-stats { display:grid; grid-template-columns:1fr 1fr 1fr; gap:6px; padding:0 16px 10px; }
    .agent-stat { background:#f6f7f9; border-radius:8px; padding:.4rem .5rem; text-align:center; }
    .agent-stat .n { font-size:.95rem; font-weight:900; color:var(--dark); }
    .agent-stat .l { font-size:.62rem; color:#aaa; font-weight:600; }

    .agent-note { margin:0 16px 10px; padding:.6rem .8rem; background:#fffbeb; border-radius:8px; font-size:.75rem; color:#666; border-left:3px solid #fbbf24; display:none; }
    .agent-note.has-note { display:block; }

    .agent-since { padding:0 16px 8px; font-size:.7rem; color:#bbb; }

    .agent-actions { display:flex; gap:6px; padding:10px 14px 14px; flex-wrap:wrap; border-top:1px solid #f0f0f0; }
    .agent-actions button, .agent-actions a {
      flex:1; min-width:70px; padding:.42rem .5rem; border-radius:8px; border:none;
      font-family:inherit; font-size:.72rem; font-weight:800; cursor:pointer;
      transition:opacity .2s; text-align:center; text-decoration:none; display:inline-flex;
      align-items:center; justify-content:center; gap:3px;
    }
    .agent-actions button:hover, .agent-actions a:hover { opacity:.82; }
    .btn-pro      { background:#fef3c7; color:#92400e; }
    .btn-suspend  { background:#fee2e2; color:#dc2626; }
    .btn-activate { background:#dcfce7; color:#16a34a; }
    .btn-kycreset { background:#ede9fe; color:#6d28d9; }
    .btn-note     { background:#f0f0f0; color:#333; }
    .btn-wa       { background:#dcfce7; color:#16a34a; }
    .btn-listings { background:#f0f0f0; color:#333; }

    /* ── Modal note ── */
    .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.55); z-index:2000; align-items:center; justify-content:center; padding:1rem; }
    .modal-overlay.open { display:flex; }
    .modal-box { background:#fff; border-radius:18px; width:100%; max-width:460px; padding:1.8rem; }
    .modal-box h2 { font-size:1rem; font-weight:800; margin-bottom:1rem; }
    .modal-box textarea { width:100%; border:1.5px solid #e5e5e5; border-radius:10px; padding:.8rem; font-family:inherit; font-size:.88rem; resize:vertical; min-height:100px; }
    .modal-box textarea:focus { outline:none; border-color:var(--orange); }
    .modal-actions { display:flex; gap:8px; justify-content:flex-end; margin-top:1rem; }
    .btn-cancel { padding:.65rem 1.2rem; border-radius:10px; border:1.5px solid #ddd; background:#fff; font-family:inherit; font-weight:700; cursor:pointer; }
    .btn-save   { padding:.65rem 1.4rem; border-radius:10px; border:none; background:var(--orange); color:#fff; font-family:inherit; font-weight:800; cursor:pointer; }

    /* ── Toast ── */
    .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(80px); background:#111; color:#fff; border-radius:999px; padding:.7rem 1.6rem; font-size:.88rem; font-weight:700; z-index:9999; transition:transform .3s,opacity .3s; opacity:0; }
    .toast.show { transform:translateX(-50%) translateY(0); opacity:1; }

    .empty-state { text-align:center; padding:3rem; background:#fff; border-radius:16px; color:#888; }

    @media(max-width:640px) { .stats-row { grid-template-columns:1fr 1fr; } }
  </style>
</head>
<body>

<header>
  <div class="container px navbar">
    <a class="brand" href="/">
      <img src="./assets/img/logo.png" alt="SE LOGER CM logo">
      <span>SE LOGER CM</span>
    </a>
    <div class="nav-right" style="display:flex;align-items:center;gap:1rem">
      <a href="/admin" style="font-size:.82rem;font-weight:700;color:#555;text-decoration:none">← Admin</a>
      <button id="signOutBtn" style="background:#111;border:none;cursor:pointer;padding:.55rem 1rem;border-radius:10px;color:#fff;font-family:inherit;font-weight:700;font-size:.82rem">
        <i class="fas fa-sign-out-alt"></i> Déconnexion
      </button>
    </div>
  </div>
</header>

<main style="display:none" id="mainContent">
  <div class="wrap">

    <div class="page-head">
      <div>
        <h1>Modération <span>Agents</span></h1>
        <p style="font-size:.82rem;color:#888;margin-top:2px">Répertoire et gestion des opérateurs de la marketplace</p>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-card" style="border-left-color:var(--orange)"><div class="num" id="sTotal" style="color:var(--orange)">0</div><div class="lbl">Agents</div></div>
      <div class="stat-card" style="border-left-color:#16a34a"><div class="num" id="sVerified" style="color:#16a34a">0</div><div class="lbl">KYC Validés</div></div>
      <div class="stat-card" style="border-left-color:#1d4ed8"><div class="num" id="sPending" style="color:#1d4ed8">0</div><div class="lbl">KYC En attente</div></div>
      <div class="stat-card" style="border-left-color:#92400e"><div class="num" id="sPro" style="color:#92400e">0</div><div class="lbl">Agents Pro</div></div>
      <div class="stat-card" style="border-left-color:#dc2626"><div class="num" id="sSuspended" style="color:#dc2626">0</div><div class="lbl">Suspendus</div></div>
    </div>

    <!-- Filters -->
    <div class="filters-bar">
      <input id="searchInput" placeholder="🔍 Rechercher par nom ou téléphone…">
      <button class="filter-pill active" data-filter="">Tous</button>
      <button class="filter-pill" data-filter="verified">✅ KYC Validés</button>
      <button class="filter-pill" data-filter="pending">⏳ En attente</button>
      <button class="filter-pill" data-filter="pro">⭐ Pro</button>
      <button class="filter-pill" data-filter="suspended">🚫 Suspendus</button>
    </div>

    <!-- Grid -->
    <div id="agentGrid" class="agent-grid"></div>
    <div id="emptyState" class="empty-state" style="display:none">
      <i class="fas fa-users" style="font-size:2rem;color:#ddd;display:block;margin-bottom:.8rem"></i>
      Aucun agent dans cette catégorie.
    </div>

  </div>
</main>

<!-- Modal note admin -->
<div class="modal-overlay" id="noteOverlay">
  <div class="modal-box">
    <h2><i class="fas fa-sticky-note" style="color:var(--orange);margin-right:.4rem"></i> Note interne</h2>
    <input type="hidden" id="noteAgentId">
    <textarea id="noteText" placeholder="Note visible uniquement par l'admin…"></textarea>
    <div class="modal-actions">
      <button class="btn-cancel" id="noteCancel">Annuler</button>
      <button class="btn-save"   id="noteSave">Enregistrer</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<footer></footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="assets/js/supabase.js"></script>
<script src="assets/js/config.js"></script>
<script src="assets/js/auth.js"></script>
<script src="assets/js/footer.js"></script>
<script src="assets/js/nav.js"></script>

<script>
/* ── Utilitaires ── */
function esc(v='') {
  return String(v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}
function fmtDate(str) {
  if (!str) return '—';
  return new Date(str).toLocaleDateString('fr-FR', { day:'numeric', month:'short', year:'numeric' });
}

/* ── State ── */
let allAgents  = [];
let activeFilter = '';
let searchQuery  = '';

/* ── Init ── */
document.addEventListener('DOMContentLoaded', async () => {
  /* Attendre Supabase */
  let tries = 0;
  while ((!window.SLCM_DB?.client) && tries < 50) {
    await new Promise(r => setTimeout(r, 100)); tries++;
  }
  if (!window.SLCM_DB?.client) { document.body.innerHTML = '<p style="padding:2rem">Erreur de connexion.</p>'; return; }

  /* Vérification admin — utilise user_metadata.role (même source que auth.js) */
  const user = await SLCM.requireAdmin();
  if (!user) return; /* requireAdmin redirige lui-même vers /connexion */

  /* Tout est OK — afficher la page */
  document.getElementById('mainContent').style.display = 'block';

  await loadAgents();
  bindFilters();
  bindNote();
});

/* ── Charger tous les agents ── */
async function loadAgents() {
  const { data, error } = await window.SLCM_DB.client
    .from('profiles')
    .select('id, name, agent_phone, phone, agent_photo, kyc_status, is_pro, is_suspended, admin_note, verified_at, created_at')
    .order('created_at', { ascending: false });

  if (error) {
    document.getElementById('agentGrid').innerHTML = `<div style="grid-column:1/-1;background:#fee2e2;border-radius:12px;padding:1rem;color:#dc2626;font-weight:700">
      Erreur Supabase : ${error.message}</div>`;
    return;
  }
  allAgents = data || [];

  /* Charger le nb d'annonces par agent */
  const ids = allAgents.map(a => a.id);
  if (ids.length) {
    const { data: listings } = await window.SLCM_DB.client
      .from('listings')
      .select('owner_id, status, expires_at');

    if (listings) {
      const now = new Date();
      const counts = {};
      listings.forEach(l => {
        if (!counts[l.owner_id]) counts[l.owner_id] = { active: 0, expired: 0, total: 0 };
        counts[l.owner_id].total++;
        if (l.status === 'active' && (!l.expires_at || new Date(l.expires_at) > now)) counts[l.owner_id].active++;
        else counts[l.owner_id].expired++;
      });
      allAgents = allAgents.map(a => ({ ...a, _counts: counts[a.id] || { active:0, expired:0, total:0 } }));
    }
  }

  updateStats();
  renderGrid();
}

/* ── Stats ── */
function updateStats() {
  document.getElementById('sTotal').textContent     = allAgents.length;
  document.getElementById('sVerified').textContent  = allAgents.filter(a => a.kyc_status === 'verified').length;
  document.getElementById('sPending').textContent   = allAgents.filter(a => a.kyc_status === 'pending').length;
  document.getElementById('sPro').textContent       = allAgents.filter(a => a.is_pro).length;
  document.getElementById('sSuspended').textContent = allAgents.filter(a => a.is_suspended).length;
}

/* ── Render ── */
function renderGrid() {
  const grid  = document.getElementById('agentGrid');
  const empty = document.getElementById('emptyState');
  const q = searchQuery.toLowerCase();

  let list = allAgents.filter(a => {
    const matchSearch = !q ||
      (a.name || '').toLowerCase().includes(q) ||
      (a.agent_phone || a.phone || '').includes(q);

    const matchFilter =
      activeFilter === ''          ? true :
      activeFilter === 'verified'  ? a.kyc_status === 'verified' :
      activeFilter === 'pending'   ? a.kyc_status === 'pending' :
      activeFilter === 'pro'       ? a.is_pro :
      activeFilter === 'suspended' ? a.is_suspended : true;

    return matchSearch && matchFilter;
  });

  if (!list.length) {
    grid.innerHTML = ''; grid.style.display = 'none'; empty.style.display = 'block'; return;
  }
  grid.style.display = 'grid'; empty.style.display = 'none';

  const kycBadge = s => {
    const map = {
      verified: '<span class="badge badge-verified"><i class="fas fa-check-circle"></i> KYC Validé</span>',
      pending:  '<span class="badge badge-pending"><i class="fas fa-clock"></i> KYC En attente</span>',
      rejected: '<span class="badge badge-rejected"><i class="fas fa-times-circle"></i> KYC Rejeté</span>',
    };
    return map[s] || '<span class="badge badge-none">KYC Non soumis</span>';
  };

  grid.innerHTML = list.map(a => {
    const phone   = esc(a.agent_phone || a.phone || '');
    const counts  = a._counts || { active:0, expired:0, total:0 };
    const hasNote = a.admin_note && a.admin_note.trim();
    const waLink  = phone ? `https://wa.me/${phone.replace(/\D/g,'')}` : '#';

    return `
    <div class="agent-card${a.is_suspended ? ' is-suspended' : ''}" id="agentCard-${a.id}">

      <div class="agent-head">
        <div class="agent-avatar">
          ${a.agent_photo ? `<img src="${esc(a.agent_photo)}" alt="${esc(a.name)}">` : '<i class="fas fa-user"></i>'}
        </div>
        <div style="flex:1;min-width:0">
          <div class="agent-name">${esc(a.name || 'Agent sans nom')}</div>
          <div class="agent-phone">${phone || '—'}</div>
        </div>
      </div>

      <div class="agent-badges">
        ${kycBadge(a.kyc_status)}
        ${a.is_pro       ? '<span class="badge badge-pro">⭐ Pro</span>' : ''}
        ${a.is_suspended ? '<span class="badge badge-suspended">🚫 Suspendu</span>' : ''}
      </div>

      <div class="agent-stats">
        <div class="agent-stat"><div class="n">${counts.active}</div><div class="l">Actives</div></div>
        <div class="agent-stat"><div class="n">${counts.expired}</div><div class="l">Expirées</div></div>
        <div class="agent-stat"><div class="n">${counts.total}</div><div class="l">Total</div></div>
      </div>

      <div class="agent-note${hasNote ? ' has-note' : ''}" id="note-${a.id}">
        ${esc(a.admin_note || '')}
      </div>

      <div class="agent-since">Membre depuis ${fmtDate(a.created_at)}</div>

      <div class="agent-actions">
        <button class="btn-pro" onclick="togglePro('${a.id}', ${!!a.is_pro})" title="${a.is_pro ? 'Retirer Pro' : 'Passer Pro'}">
          ${a.is_pro ? '★ Retirer Pro' : '⭐ Pro'}
        </button>
        ${a.is_suspended
          ? `<button class="btn-activate" onclick="toggleSuspend('${a.id}', true)">✅ Réactiver</button>`
          : `<button class="btn-suspend"  onclick="toggleSuspend('${a.id}', false)">🚫 Suspendre</button>`
        }
        <button class="btn-kycreset" onclick="resetKyc('${a.id}')" title="Réinitialiser KYC">🔄 KYC</button>
        <button class="btn-note" onclick="openNote('${a.id}', ${JSON.stringify(esc(a.admin_note||''))})">📝 Note</button>
        ${phone ? `<a class="btn-wa" href="${waLink}" target="_blank" rel="noopener"><i class="fab fa-whatsapp"></i></a>` : ''}
        <a class="btn-listings" href="/admin#${a.id}" target="_blank" title="Voir les annonces"><i class="fas fa-list"></i></a>
      </div>

    </div>`;
  }).join('');
}

/* ── Filtres ── */
function bindFilters() {
  document.querySelectorAll('.filter-pill').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-pill').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeFilter = btn.dataset.filter;
      renderGrid();
    });
  });
  document.getElementById('searchInput').addEventListener('input', e => {
    searchQuery = e.target.value;
    renderGrid();
  });
}

/* ── Actions ── */
async function togglePro(id, isPro) {
  const { error } = await window.SLCM_DB.client.from('profiles').update({ is_pro: !isPro }).eq('id', id);
  if (error) { showToast('Erreur : ' + error.message); return; }
  const idx = allAgents.findIndex(a => a.id === id);
  if (idx !== -1) allAgents[idx].is_pro = !isPro;
  updateStats(); renderGrid();
  showToast(!isPro ? '⭐ Agent passé Pro' : 'Badge Pro retiré');
}

async function toggleSuspend(id, isSuspended) {
  const { error } = await window.SLCM_DB.client.from('profiles').update({ is_suspended: !isSuspended }).eq('id', id);
  if (error) { showToast('Erreur : ' + error.message); return; }
  const idx = allAgents.findIndex(a => a.id === id);
  if (idx !== -1) allAgents[idx].is_suspended = !isSuspended;
  updateStats(); renderGrid();
  showToast(!isSuspended ? '🚫 Agent suspendu' : '✅ Agent réactivé');
}

async function resetKyc(id) {
  if (!confirm('Réinitialiser le KYC de cet agent ? Il devra resoumettre ses documents.')) return;
  const { error } = await window.SLCM_DB.client.from('profiles')
    .update({ kyc_status: 'none', kyc_doc_url: null, kyc_doc_verso: null, verified_at: null })
    .eq('id', id);
  if (error) { showToast('Erreur : ' + error.message); return; }
  const idx = allAgents.findIndex(a => a.id === id);
  if (idx !== -1) { allAgents[idx].kyc_status = 'none'; allAgents[idx].verified_at = null; }
  updateStats(); renderGrid();
  showToast('🔄 KYC réinitialisé');
}

/* ── Note admin ── */
function openNote(id, currentNote) {
  document.getElementById('noteAgentId').value = id;
  document.getElementById('noteText').value = currentNote;
  document.getElementById('noteOverlay').classList.add('open');
}
function bindNote() {
  document.getElementById('noteCancel').addEventListener('click', () => {
    document.getElementById('noteOverlay').classList.remove('open');
  });
  document.getElementById('noteSave').addEventListener('click', async () => {
    const id   = document.getElementById('noteAgentId').value;
    const note = document.getElementById('noteText').value.trim();
    const { error } = await window.SLCM_DB.client.from('profiles').update({ admin_note: note }).eq('id', id);
    if (error) { showToast('Erreur : ' + error.message); return; }
    const idx = allAgents.findIndex(a => a.id === id);
    if (idx !== -1) allAgents[idx].admin_note = note;
    document.getElementById('noteOverlay').classList.remove('open');
    renderGrid();
    showToast('📝 Note enregistrée');
  });
}
</script>
</body>
</html>
