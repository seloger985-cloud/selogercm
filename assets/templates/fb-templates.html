<style>
  :root { --orange:#ff7a00; --dark:#111; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'Segoe UI',Arial,sans-serif; background:#f6f7f9; color:#111; }

  header {
    background:#111; padding:18px 24px;
    display:flex; align-items:center; justify-content:space-between;
  }
  header span { color:#fff; font-size:1.1rem; font-weight:800; }
  header span em { color:#ff7a00; font-style:normal; }
  header small { color:#888; font-size:.8rem; }

  .controls {
    max-width:1100px; margin:24px auto; padding:0 20px;
    display:flex; gap:10px; flex-wrap:wrap; align-items:center;
  }
  .style-btn {
    padding:8px 22px; border-radius:999px; border:2px solid #ddd;
    background:#fff; font-size:.88rem; font-weight:700; cursor:pointer;
    transition:all .15s;
  }
  .style-btn.active { background:#111; color:#fff; border-color:#111; }
  .style-btn.orange.active { background:#ff7a00; border-color:#ff7a00; color:#fff; }
  .filter-label { font-size:.82rem; color:#888; font-weight:600; margin-left:8px; }

  .grid {
    max-width:1100px; margin:0 auto 40px; padding:0 20px;
    display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:16px;
  }

  .card {
    background:#fff; border-radius:14px;
    box-shadow:0 2px 12px rgba(0,0,0,.07);
    overflow:hidden; display:flex; flex-direction:column;
  }
  .card-head {
    padding:12px 16px; display:flex; align-items:center;
    justify-content:space-between; border-bottom:1px solid #f0f0f0;
  }
  .card-type {
    font-size:.78rem; font-weight:800; text-transform:uppercase;
    letter-spacing:.5px; color:#888;
  }
  .card-style {
    font-size:.7rem; font-weight:800; padding:3px 10px;
    border-radius:999px;
  }
  .card-style.sobre { background:#f0f0f0; color:#555; }
  .card-style.premium { background:#fff4e8; color:#ff7a00; }

  .card-body {
    padding:14px 16px; flex:1;
    font-size:.82rem; line-height:1.7; color:#333;
    white-space:pre-wrap; font-family:monospace;
    background:#fafafa;
  }

  .card-footer {
    padding:10px 16px; border-top:1px solid #f0f0f0;
    display:flex; gap:8px;
  }
  .btn-copy {
    flex:1; padding:8px; border-radius:8px; border:none;
    background:#111; color:#fff; font-size:.82rem; font-weight:700;
    cursor:pointer; transition:background .15s;
  }
  .btn-copy:hover { background:#333; }
  .btn-copy.copied { background:#2e7d32; }

  /* Hide/show by style */
  .card[data-style="sobre"]   { display:flex; }
  .card[data-style="premium"] { display:none; }
  body.show-premium .card[data-style="sobre"]   { display:none; }
  body.show-premium .card[data-style="premium"] { display:flex; }
  body.show-all .card { display:flex !important; }

  @media(max-width:600px) { .grid { grid-template-columns:1fr; } }
</style>

/* ── Render ── */
const grid = document.getElementById('grid');
TEMPLATES.forEach((t, i) => {
  const card = document.createElement('div');
  card.className = 'card';
  card.dataset.style = t.style;
  card.innerHTML = `
    <div class="card-head">
      <span class="card-type">${t.type}</span>
      <span class="card-style ${t.style}">${t.style === 'sobre' ? 'Sobre' : '⭐ Premium'}</span>
    </div>
    <div class="card-body">${escHtml(t.text)}</div>
    <div class="card-footer">
      <button class="btn-copy" onclick="copyText(${i}, this)">📋 Copier</button>
    </div>`;
  grid.appendChild(card);
});

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function copyText(i, btn) {
  navigator.clipboard.writeText(TEMPLATES[i].text).then(() => {
    btn.textContent = '✅ Copié !';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '📋 Copier'; btn.classList.remove('copied'); }, 2000);
  });
}

function setStyle(style, btn) {
  document.querySelectorAll('.style-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.body.classList.remove('show-premium','show-all');
  if (style === 'premium') document.body.classList.add('show-premium');
  if (style === 'all')     document.body.classList.add('show-all');
}
