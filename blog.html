<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <title>Blog Immobilier — SE LOGER CM</title>
  <meta name="description" content="Actualités, conseils et tendances du marché immobilier à Douala par SE LOGER CM.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="assets/css/style.css">
  <!-- Google Tag Manager -->
  <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
  new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
  j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
  'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
  })(window,document,'script','dataLayer','GTM-WVWKFVTF');</script>
  <style>
    :root { --orange: #ff7a00; }
    body { background: #f6f7f9; font-family: 'Poppins', sans-serif; }
    main { padding-top: 90px; padding-bottom: 60px; }
    .wrap { max-width: 1000px; margin: auto; padding: 0 1.5rem; }

    /* Hero */
    .blog-hero {
      background: #111; color: #fff;
      padding: 3.5rem 1.5rem; text-align: center;
      margin-top: 70px;
    }
    .blog-hero h1 { font-size: clamp(1.8rem, 5vw, 2.8rem); font-weight: 900; margin-bottom: .6rem; }
    .blog-hero h1 span { color: var(--orange); }
    .blog-hero p { opacity: .75; font-size: 1rem; max-width: 460px; margin: 0 auto; line-height: 1.7; }

    /* Filtres catégories */
    .filters {
      display: flex; gap: .6rem; flex-wrap: wrap;
      margin: 2rem 0 1.5rem;
    }
    .filter-btn {
      padding: .5rem 1.1rem; border-radius: 999px;
      border: 1.5px solid #ddd; background: #fff;
      font-family: inherit; font-size: .85rem; font-weight: 700;
      cursor: pointer; color: #555;
      transition: all .2s;
    }
    .filter-btn:hover { border-color: var(--orange); color: var(--orange); }
    .filter-btn.active {
      background: var(--orange); color: #fff; border-color: var(--orange);
    }

    /* Grille articles */
    .articles-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
      gap: 1.4rem;
    }

    /* Carte article */
    .article-card {
      background: #fff; border-radius: 18px; overflow: hidden;
      box-shadow: 0 4px 16px rgba(0,0,0,.07);
      transition: transform .25s, box-shadow .25s;
      cursor: pointer; text-decoration: none; color: inherit;
      display: flex; flex-direction: column;
    }
    .article-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 12px 32px rgba(0,0,0,.12);
    }

    /* Cover image / placeholder */
    .card-cover {
      height: 180px; overflow: hidden;
      background: #111;
      display: flex; align-items: center; justify-content: center;
      position: relative;
    }
    .card-cover img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .card-cover .cover-placeholder {
      font-size: 3.5rem; opacity: .3;
    }
    .card-cover .cat-badge {
      position: absolute; bottom: 10px; left: 12px;
      color: #fff; font-size: .72rem; font-weight: 800;
      padding: .25rem .65rem; border-radius: 999px;
      backdrop-filter: blur(4px);
    }

    .card-body { padding: 1.2rem 1.3rem; flex: 1; display: flex; flex-direction: column; }
    .card-meta {
      display: flex; align-items: center; gap: .5rem;
      font-size: .78rem; color: #999; margin-bottom: .6rem;
    }
    .card-meta span { display: flex; align-items: center; gap: .25rem; }
    .card-title {
      font-size: 1rem; font-weight: 800; color: #111;
      line-height: 1.4; margin-bottom: .6rem;
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
    }
    .card-excerpt {
      font-size: .85rem; color: #666; line-height: 1.6;
      display: -webkit-box; -webkit-line-clamp: 3;
      -webkit-box-orient: vertical; overflow: hidden;
      flex: 1;
    }
    .card-read {
      margin-top: 1rem; font-size: .83rem; font-weight: 700;
      color: var(--orange); display: flex; align-items: center; gap: .3rem;
    }

    /* Article vedette (premier) */
    .article-card.featured {
      grid-column: 1 / -1;
      flex-direction: row;
    }
    .article-card.featured .card-cover {
      width: 40%; height: auto; min-height: 220px; flex-shrink: 0;
    }
    .article-card.featured .card-title { font-size: 1.2rem; -webkit-line-clamp: 3; }
    .article-card.featured .card-excerpt { -webkit-line-clamp: 4; }

    /* Empty state */
    .empty { text-align: center; padding: 3rem; color: #aaa; }
    .empty i { font-size: 2.5rem; display: block; margin-bottom: 1rem; }

    /* Back link */
    .back-link {
      display: inline-flex; align-items: center; gap: .4rem;
      color: #555; font-weight: 600; font-size: .9rem;
      text-decoration: none; margin: 2rem 0 0;
      transition: color .2s;
    }
    .back-link:hover { color: var(--orange); }

    @media (max-width: 640px) {
      .article-card.featured { flex-direction: column; }
      .article-card.featured .card-cover { width: 100%; min-height: 180px; }
    }
  </style>
</head>
<body>
  <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-WVWKFVTF"
  height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>

  <header>
    <div class="container px navbar">
      <a class="brand" href="/">
        <img src="./assets/img/logo.png" alt="SE LOGER CM logo">
        <span>SE LOGER CM</span>
      </a>
      <div class="nav-right">
        <a href="/annonces" class="btn-primary" style="text-decoration:none;">Voir les annonces</a>
      </div>
    </div>
  </header>

  <div class="blog-hero">
    <h1>Blog <span>Immobilier</span></h1>
    <p>Actualités, conseils et tendances du marché immobilier à Douala par nos experts.</p>
  </div>

  <main>
    <div class="wrap">
      <a href="/" class="back-link">
        <i class="fas fa-arrow-left"></i> Retour à l'accueil
      </a>

      <!-- Filtres -->
      <div class="filters" id="filters">
        <button class="filter-btn active" data-cat="all">Tous les articles</button>
        <button class="filter-btn" data-cat="marche">📈 Marché Immobilier</button>
        <button class="filter-btn" data-cat="locataires">🏠 Conseils Locataires</button>
        <button class="filter-btn" data-cat="proprietaires">🔑 Conseils Propriétaires</button>
        <button class="filter-btn" data-cat="tendances">📍 Tendances Douala</button>
      </div>

      <!-- Articles -->
      <div class="articles-grid" id="articlesGrid"></div>
      <div class="empty" id="emptyState" style="display:none;">
        <i class="fas fa-newspaper"></i>
        <p>Aucun article dans cette catégorie pour l'instant.</p>
      </div>
    </div>
  </main>

  <footer></footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="assets/js/supabase.js"></script>
  <script src="assets/js/blog.js"></script>
  <script src="assets/js/footer.js"></script>
  <script src="assets/js/nav.js"></script>
  <script>
  document.addEventListener('DOMContentLoaded', async () => {
    let currentCat = 'all';

    async function renderArticles(cat) {
      const grid  = document.getElementById('articlesGrid');
      const empty = document.getElementById('emptyState');

      grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:2rem;color:#aaa"><i class="fas fa-spinner fa-spin"></i></div>';

      const all  = await SLCM_blog.getAllArticles();
      const list = cat === 'all' ? all : all.filter(a => a.category === cat);

      grid.innerHTML = '';

      if (list.length === 0) {
        grid.style.display = 'none';
        empty.style.display = 'block';
        return;
      }
      grid.style.display = 'grid';
      empty.style.display = 'none';

      list.forEach((art, idx) => {
        const catInfo  = SLCM_blog.getCategoryInfo(art.category);
        const featured = idx === 0 ? 'featured' : '';

        const card = document.createElement('a');
        card.className = `article-card ${featured}`;
        card.href = `article.html?id=${art.id}`;

        const coverHtml = art.cover
          ? `<img src="${art.cover}" alt="${art.title}" loading="lazy">`
          : `<span class="cover-placeholder">${catInfo.icon}</span>`;

        card.innerHTML = `
          <div class="card-cover" style="background:${art.cover ? '#eee' : '#111'}">
            ${coverHtml}
            <span class="cat-badge" style="background:${catInfo.color}">${catInfo.icon} ${catInfo.label}</span>
          </div>
          <div class="card-body">
            <div class="card-meta">
              <span><i class="fas fa-calendar-alt"></i> ${SLCM_blog.formatDate(art.date)}</span>
              <span>·</span>
              <span><i class="fas fa-clock"></i> ${SLCM_blog.readingTime(art.content)}</span>
            </div>
            <div class="card-title">${art.title}</div>
            <div class="card-excerpt">${art.excerpt}</div>
            <div class="card-read">Lire l'article <i class="fas fa-arrow-right"></i></div>
          </div>
        `;

        grid.appendChild(card);
      });
    }

    // Filtres
    document.getElementById('filters').addEventListener('click', (e) => {
      const btn = e.target.closest('.filter-btn');
      if (!btn) return;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentCat = btn.dataset.cat;
      renderArticles(currentCat);
    });

    await renderArticles('all');
  });
  </script>
  <script src="assets/js/cookies.js" defer></script>
</body>
</html>
