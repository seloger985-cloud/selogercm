  <script>
    /* ══════════════════════════════════════
       HELPERS
    ══════════════════════════════════════ */
    function fmtPrice(n) {
      return (n || 0).toLocaleString('fr-FR') + ' FCFA';
    }

    function capitalize(str) {
      if (!str) return '';
      return str.charAt(0).toUpperCase() + str.slice(1);
    }

    /* Normalise les champs Supabase snake_case vers camelCase attendu par renderDetail */
    function normalizeAd(ad) {
      ad.title_en  = ad.title_en  || ad.title       || '';
      ad.title_fr  = ad.title_fr  || ad.title       || '';
      ad.rentSale  = ad.rentSale  || ad.rent_sale   || 'rent';
      ad.furnished = !!ad.furnished;
      ad.premium   = !!ad.premium;
      ad.images    = ad.images    || [];
      return ad;
    }

    /* ══════════════════════════════════════
       LIRE L'ID DEPUIS L'URL + CHARGER SUPABASE
    ══════════════════════════════════════ */
    const params      = new URLSearchParams(window.location.search);
    /* Support URL SEO: /annonce/douala-bonapriso-xxx OU /annonce?id=uuid */
    const pathParts   = window.location.pathname.split('/').filter(Boolean);
    const urlSlug     = pathParts[0] === 'annonce' && pathParts[1] ? pathParts[1] : null;
    const adId        = params.get('id');
    const pageContent = document.getElementById('pageContent');

    pageContent.innerHTML = '<div style="text-align:center;padding:4rem;color:#aaa"><i class="fas fa-spinner fa-spin" style="font-size:2rem"></i><p style="margin-top:1rem">Chargement…</p></div>';


    /* ── Sécurité XSS — Échapper le HTML utilisateur ── */
    function escapeHtml(str) {
      if (str == null) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    async function loadAndRender() {
      if (!adId && !urlSlug) { showError("Identifiant d'annonce manquant."); return; }

      let tries = 0;
      while ((!window.SLCM_DB || !window.SLCM_DB.client) && tries < 30) {
        await new Promise(r => setTimeout(r, 100));
        tries++;
      }

      if (!window.SLCM_listings) { showError("Erreur de chargement des scripts."); return; }

      /* Chercher par slug (priorité) ou par id */
      let ad = null;
      if (urlSlug) {
        const { data } = await window.SLCM_DB.client
          .from('listings').select('*')
          .eq('slug', urlSlug).eq('status', 'active').single();
        ad = data;
      }
      if (!ad && adId) {
        ad = await SLCM_listings.getListingById(adId);
      }
      if (!ad) { showError("Cette annonce n'existe pas ou a été supprimée."); return; }

      /* Redirection SEO: si on est arrivé via ?id=uuid mais l'annonce a un slug, rediriger */
      if (adId && !urlSlug && ad.slug) {
        window.history.replaceState({}, '', `/annonce/${ad.slug}`);
      }

      normalizeAd(ad);
      window._currentAdOwnerId = ad.owner_id || null; /* Pour la modale agent */

      /* ── Incrémenter le compteur de vues (1 fois par session) ── */
      const viewKey = 'slcm_viewed_' + ad.id;
      if (!sessionStorage.getItem(viewKey)) {
        sessionStorage.setItem(viewKey, '1');
        try {
          await window.SLCM_DB.client.rpc('increment_views', { listing_id: ad.id });
        } catch(e) {
          /* Fallback direct si RPC non disponible */
          const currentViews = ad.views || 0;
          window.SLCM_DB.client.from('listings')
            .update({ views: currentViews + 1 })
            .eq('id', ad.id);
        }
      }

      renderDetail(ad);

      /* ── SEO dynamique ── */
      const adTitle    = ad.title || ad.title_en || 'Annonce immobilière';
      const adCity     = [ad.district, ad.city].filter(Boolean).join(', ') || 'Douala';
      const adPrice    = (ad.price || 0).toLocaleString('fr-FR') + ' FCFA';
      const adMode     = ad.rent_sale === 'sale' ? 'à vendre' : 'à louer';
      const adImg      = (ad.images && ad.images[0]) || 'https://www.selogercm.com/assets/img/og-cover.jpg';
      const adUrl      = `https://www.selogercm.com/annonce/${ad.slug || ad.id}`;
      const adDesc     = ad.type === 'fonds-commerce'
        ? `${adTitle} — ${adCity} — Prix du fonds : ${adPrice}.${ad.business_rent ? ' Loyer : ' + (ad.business_rent || 0).toLocaleString('fr-FR') + ' FCFA/mois.' : ''} ${ad.description ? ad.description.slice(0, 120) + '…' : 'Annonce vérifiée par SE LOGER CM.'}`
        : `${adTitle} — ${adCity} — ${adPrice} ${adMode}. ${ad.description ? ad.description.slice(0, 120) + '…' : 'Annonce immobilière vérifiée par SE LOGER CM.'}`;

      /* Title */
      document.title = `${adTitle} — ${adCity} | SE LOGER CM`;

      /* Meta description */
      const metaDesc = document.querySelector('meta[name="description"]');
      if (metaDesc) metaDesc.setAttribute('content', adDesc);

      /* Open Graph */
      const setOG = (prop, val) => {
        const el = document.querySelector(`meta[property="${prop}"]`);
        if (el) el.setAttribute('content', val);
      };
      setOG('og:title',       `${adTitle} — ${adCity} | SE LOGER CM`);
      setOG('og:description', adDesc);
      setOG('og:image',       adImg);
      setOG('og:url',         adUrl);

      /* Twitter Card */
      const setTW = (name, val) => {
        const el = document.querySelector(`meta[name="${name}"]`);
        if (el) el.setAttribute('content', val);
      };
      setTW('twitter:title',       `${adTitle} — ${adCity} | SE LOGER CM`);
      setTW('twitter:description', adDesc);
      setTW('twitter:image',       adImg);

      document.title = `${adTitle} — ${adCity} | SE LOGER CM`;

      /* ── Annonces similaires ── */
      loadSimilarListings(ad);
    }

    async function loadSimilarListings(ad) {
      const client = window.SLCM_DB?.client;
      if (!client) return;

      const section = document.getElementById('similarSection');
      const grid    = document.getElementById('similarGrid');
      const title   = document.getElementById('similarTitle');
      const sub     = document.getElementById('similarSub');

      /* ── Fourchette de prix ±30% ── */
      const priceMin = ad.price ? Math.floor(ad.price * 0.7) : 0;
      const priceMax = ad.price ? Math.ceil(ad.price * 1.3)  : 999999999;

      let ownerListings = [];
      let similarListings = [];

      /* Bloc 1 — Autres annonces du même annonceur */
      if (ad.owner_id) {
        const { data } = await client
          .from('listings')
          .select('*')
          .eq('status', 'active')
          .eq('owner_id', ad.owner_id)
          .neq('id', ad.id)
          .order('created_at', { ascending: false })
          .limit(3);
        ownerListings = data || [];
      }

      /* Bloc 2 — Annonces similaires : même quartier + même type + fourchette prix */
      if (ad.district) {
        const { data: byDistrict } = await client
          .from('listings')
          .select('*')
          .eq('status', 'active')
          .neq('id', ad.id)
          .eq('city', ad.city || 'Douala')
          .eq('district', ad.district)
          .eq('type', ad.type)
          .gte('price', priceMin)
          .lte('price', priceMax)
          .order('created_at', { ascending: false })
          .limit(6);

        similarListings = (byDistrict || [])
          .filter(l => !ownerListings.find(x => x.id === l.id))
          .slice(0, 3);
      }

      /* Fallback — même ville + même type + fourchette prix */
      if (similarListings.length < 3) {
        const { data: byCity } = await client
          .from('listings')
          .select('*')
          .eq('status', 'active')
          .neq('id', ad.id)
          .eq('city', ad.city || 'Douala')
          .eq('type', ad.type)
          .gte('price', priceMin)
          .lte('price', priceMax)
          .order('created_at', { ascending: false })
          .limit(6);

        const extra = (byCity || [])
          .filter(l => !ownerListings.find(x => x.id === l.id) && !similarListings.find(x => x.id === l.id));
        similarListings = [...similarListings, ...extra].slice(0, 3);
      }

      /* Rien à afficher */
      if (!ownerListings.length && !similarListings.length) return;

      section.style.display = 'block';

      let html = '';

      /* Bloc annonceur */
      if (ownerListings.length) {
        title.textContent = '🏠 Autres annonces de cet annonceur';
        sub.textContent   = 'Plus de biens proposés par le même propriétaire ou agent.';
        html += ownerListings.map(l => SLCM_listings.renderCard(l)).join('');
      } else {
        title.textContent = `📍 Annonces similaires à ${ad.district || ad.city || 'Douala'}`;
        sub.textContent   = `Même type de bien · Prix similaire (±30%) · Même zone`;
      }

      /* Bloc similaires (si différent du bloc annonceur) */
      if (similarListings.length && ownerListings.length) {
        html += `<div style="grid-column:1/-1;margin-top:1.5rem;margin-bottom:.5rem">
          <div style="font-size:.95rem;font-weight:900;color:#111">📍 Annonces similaires dans ce quartier</div>
          <div style="font-size:.8rem;color:#888">Même type · Prix similaire ±30%</div>
        </div>`;
        html += similarListings.map(l => SLCM_listings.renderCard(l)).join('');
      } else if (similarListings.length) {
        html += similarListings.map(l => SLCM_listings.renderCard(l)).join('');
      }

      grid.innerHTML = html;
    }

    loadAndRender();

        { label: 'Type',       val: capitalize(ad.type) || '—' },
        { label: 'Statut',     val: ad.furnished ? 'Meublé' : 'Non meublé' },
        ...(ad.type === 'fonds-commerce' && ad.business_activity ? [{ label: 'Activité', val: ad.business_activity }] : []),
        ...(ad.type === 'fonds-commerce' && ad.business_rent ? [{ label: 'Loyer mensuel', val: (ad.business_rent || 0).toLocaleString('fr-FR') + ' FCFA/mois' }] : []),

      /* ── Galerie thumbnails ── */

      /* ── Description ── */

      pageContent.innerHTML = `

      /* ══ Liens contact avec infos du bien ══ */
      setTimeout(async () => {

        const mode    = ad.rentSale === 'sale' ? 'À vendre' : 'À louer';

      const lightbox   = document.getElementById('lightbox');
      const lbImg      = document.getElementById('lbImg');
      const lbCounter  = document.getElementById('lbCounter');
      const lbTitle    = document.getElementById('lbTitle');
      const lbStrip    = document.getElementById('lbStrip');
      const lbFullBtn  = document.getElementById('lbFullscreen');

      /* Construire la strip de miniatures */
      function buildStrip() {
        lbStrip.innerHTML = '';
        images.forEach((src, i) => {
          const img = document.createElement('img');
          img.src = src;
          img.alt = `Photo ${i + 1}`;
          img.dataset.idx = i;
          img.addEventListener('click', () => lbGoTo(i));
          lbStrip.appendChild(img);
        });
      }
      buildStrip();

      /* Aller à une photo avec animation fade */
      function lbGoTo(idx) {
        lbIdx = ((idx % images.length) + images.length) % images.length;

        // Fade out → change src → fade in
        lbImg.classList.add('fade');
        setTimeout(() => {
          lbImg.src = images[lbIdx];
          lbImg.classList.remove('fade');
        }, 200);

        // Mettre à jour compteur et titre
        lbCounter.textContent = `${lbIdx + 1} / ${images.length}`;
        lbTitle.textContent = title;

        // Mettre à jour la strip
        lbStrip.querySelectorAll('img').forEach((t, i) => {
          t.classList.toggle('active', i === lbIdx);
        });

        // Scroll la strip pour centrer la miniature active
        const activeThumb = lbStrip.children[lbIdx];
        if (activeThumb) {
          activeThumb.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
        }

        // Désactiver nav si une seule photo
        document.getElementById('lbPrev').disabled = images.length <= 1;
        document.getElementById('lbNext').disabled = images.length <= 1;
      }

      function openLightbox(idx) {
        lbGoTo(idx);
        lightbox.classList.add('open');
        document.body.style.overflow = 'hidden';
      }

      function closeLightbox() {
        lightbox.classList.remove('open');
        document.body.style.overflow = '';
      }

      /* Boutons */
      document.getElementById('lbClose').addEventListener('click', closeLightbox);
      document.getElementById('lbPrev').addEventListener('click', () => lbGoTo(lbIdx - 1));
      document.getElementById('lbNext').addEventListener('click', () => lbGoTo(lbIdx + 1));

      /* Clic sur le fond pour fermer */
      lightbox.addEventListener('click', (e) => {
        if (e.target === lightbox || e.target === document.querySelector('.lb-img-wrap')) {
          closeLightbox();
        }
      });

      /* Plein écran */
      lbFullBtn?.addEventListener('click', () => {
        if (!document.fullscreenElement) {
          lightbox.requestFullscreen?.();
          lbFullBtn.innerHTML = '<i class="fas fa-compress"></i>';
        } else {
          document.exitFullscreen?.();
          lbFullBtn.innerHTML = '<i class="fas fa-expand"></i>';
        }
      });
      document.addEventListener('fullscreenchange', () => {
        if (!document.fullscreenElement && lbFullBtn) {
          lbFullBtn.innerHTML = '<i class="fas fa-expand"></i>';
        }
      });

      /* Touches clavier */
      document.addEventListener('keydown', (e) => {
        if (!lightbox.classList.contains('open')) return;
        if (e.key === 'ArrowRight' || e.key === 'ArrowDown')  lbGoTo(lbIdx + 1);
        if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')    lbGoTo(lbIdx - 1);
        if (e.key === 'Escape') closeLightbox();
      });

      /* Swipe tactile (mobile) */
      let touchStartX = 0;
      let touchStartY = 0;
      lbImg.addEventListener('touchstart', (e) => {
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
      }, { passive: true });
      lbImg.addEventListener('touchend', (e) => {
        const dx = e.changedTouches[0].clientX - touchStartX;
        const dy = e.changedTouches[0].clientY - touchStartY;
        if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 50) {
          dx < 0 ? lbGoTo(lbIdx + 1) : lbGoTo(lbIdx - 1);
        }
      }, { passive: true });
    }

    /* ══════════════════════════════════════
       MODAL PROFIL AGENT
    ══════════════════════════════════════ */
    let _agentProfile = null; /* Cache du profil chargé */

    async function openAgentModal() {
      const overlay = document.getElementById('agentModalOverlay');
      overlay.classList.add('open');
      document.body.style.overflow = 'hidden';

      /* Si déjà chargé, afficher directement */
      if (_agentProfile) { renderAgentModal(_agentProfile); return; }

      /* Charger le profil depuis Supabase */
      const ownerId = window._currentAdOwnerId;
      if (!ownerId) { closeAgentModal(); return; }

      const client = window.SLCM_DB?.client;
      if (!client) { closeAgentModal(); return; }

      const { data: profile } = await client
        .from('profiles')
        .select('*')
        .eq('id', ownerId)
        .single();

      /* Compter les annonces actives */
      const { count } = await client
        .from('listings')
        .select('*', { count: 'exact', head: true })
        .eq('owner_id', ownerId)
        .eq('status', 'active');

      _agentProfile = { ...profile, listingCount: count || 0 };
      renderAgentModal(_agentProfile);
    }

    function renderAgentModal(p) {
      /* Avatar */
      const avatarEl = document.getElementById('modalAvatar');
      if (p.agent_photo) {
        avatarEl.innerHTML = `<img src="${p.agent_photo}" alt="${escapeHtml(p.name || 'Agent')}">`;
      } else {
        avatarEl.innerHTML = `<span>${(p.name || 'A').charAt(0).toUpperCase()}</span>`;
      }

      /* Nom */
      document.getElementById('modalName').textContent = p.name || 'Agent SE LOGER CM';

      /* Vérifié */
      if (p.is_pro && p.verified_at) {
        document.getElementById('modalVerified').style.display = 'block';
      }

      /* Bio */
      document.getElementById('modalBio').textContent =
        p.agent_bio || 'Agent immobilier professionnel sur SE LOGER CM.';

      /* Stats */
      const statsEl = document.getElementById('modalStats');
      statsEl.style.display = 'flex';
      document.getElementById('modalCount').textContent = p.listingCount;
      document.getElementById('modalSince').textContent = p.created_at
        ? new Date(p.created_at).getFullYear() : '—';

      /* Boutons contact */
      const phone = p.agent_phone || p.phone || '';
      const btnsEl = document.getElementById('modalBtns');
      btnsEl.innerHTML = '';

      if (phone) {
        const callBtn = document.createElement('a');
        callBtn.href = 'tel:' + phone;
        callBtn.className = 'agent-modal-btn btn-agent-call';
        callBtn.innerHTML = '<i class="fas fa-phone"></i> Appeler';
        btnsEl.appendChild(callBtn);

        const waBtn = document.createElement('a');
        waBtn.href = 'https://wa.me/' + phone.replace(/[^0-9]/g, '');
        waBtn.target = '_blank';
        waBtn.rel = 'noopener';
        waBtn.className = 'agent-modal-btn btn-agent-wa';
        waBtn.innerHTML = '<i class="fab fa-whatsapp"></i> WhatsApp';
        btnsEl.appendChild(waBtn);
      } else {
        /* Pas de téléphone → bouton SE LOGER CM */
        const waBtn = document.createElement('a');
        waBtn.href = 'https://wa.me/237650840714';
        waBtn.target = '_blank';
        waBtn.className = 'agent-modal-btn btn-agent-wa';
        waBtn.innerHTML = '<i class="fab fa-whatsapp"></i> Contacter via SE LOGER CM';
        btnsEl.appendChild(waBtn);
      }

      /* Bouton voir profil public */
      const profileBtn = document.createElement('a');
      profileBtn.href = `/profil-agent?id=${p.id}`;
      profileBtn.target = '_blank';
      profileBtn.style.cssText = 'display:flex;align-items:center;justify-content:center;gap:.5rem;padding:.7rem;border-radius:12px;background:#f0f0f0;color:#333;font-weight:700;font-size:.85rem;text-decoration:none;margin-top:.4rem;transition:background .2s';
      profileBtn.innerHTML = '<i class="fas fa-user-circle" style="color:var(--orange)"></i> Voir le profil complet';
      profileBtn.onmouseover = () => profileBtn.style.background = '#e5e5e5';
      profileBtn.onmouseout  = () => profileBtn.style.background = '#f0f0f0';
      btnsEl.appendChild(profileBtn);
    }

    function closeAgentModal() {
      document.getElementById('agentModalOverlay').classList.remove('open');
      document.body.style.overflow = '';
    }

    /* Fermeture */
    /* ── Copier le lien ── */
    function copyListingLink() {
      const url = window._currentListingUrl || window.location.href;
      navigator.clipboard.writeText(url).then(() => {
        const btn = document.getElementById('shareCopy');
        btn.classList.add('copied');
        btn.innerHTML = '<i class="fas fa-check"></i> Copié !';
        setTimeout(() => {
          btn.classList.remove('copied');
          btn.innerHTML = '<i class="fas fa-link"></i> Copier';
        }, 2000);
      });
    }

    document.getElementById('agentModalClose').addEventListener('click', closeAgentModal);
    document.getElementById('agentModalOverlay').addEventListener('click', e => {
      if (e.target === document.getElementById('agentModalOverlay')) closeAgentModal();
    });
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape' && document.getElementById('agentModalOverlay').classList.contains('open')) {
        closeAgentModal();
      }
    });

  </script>
