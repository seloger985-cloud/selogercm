    #resultsGrid {
      display: grid !important;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)) !important;
      gap: 1.2rem !important;
    }
    .listing-card {
      background: #fff;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 16px rgba(0,0,0,.07);
      transition: transform .2s, box-shadow .2s;
    }
    .listing-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 28px rgba(0,0,0,.12);
    }
    .listing-badge {
      position: absolute; top: 10px; left: 10px;
      background: #111; color: #fff;

      font-size: .75rem; font-weight: 800;
    }
    .listing-badge.premium { background: #ff7a00; }
    .fav-btn {

      border-radius: 50%; width: 34px; height: 34px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: .95rem; color: #ff7a00;
      transition: transform .2s;
    }
    .fav-btn:hover { transform: scale(1.15); }

    /* ── Pagination ── */
    .pagination {
      display: flex; align-items: center; justify-content: center;
      gap: .4rem; margin: 2.5rem 0 1rem; flex-wrap: wrap;
    }
    .page-btn {
      min-width: 38px; height: 38px; padding: 0 .6rem;
      border: 1.5px solid #e5e5e5; background: #fff;
      border-radius: 10px; font-family: inherit; font-size: .85rem;
      font-weight: 700; color: #555; cursor: pointer;
      transition: all .2s; display: flex; align-items: center; justify-content: center;
    }
    .page-btn:hover { border-color: #ff7a00; color: #ff7a00; }
    .page-btn.active { background: #ff7a00; border-color: #ff7a00; color: #fff; }
    .page-btn:disabled { opacity: .35; cursor: default; pointer-events: none; }
    .page-btn.prev-next { gap: .3rem; padding: 0 .9rem; }
    .pagination-info {
      text-align: center; font-size: .82rem; color: #aaa;
      margin-bottom: .5rem;
    }
    /* ── Bouton alerte ── */
    .alert-bar {
      display: flex; align-items: center; justify-content: flex-end;
      margin: .75rem 0 0; gap: .6rem;
    }
    .btn-alert {
      display: inline-flex; align-items: center; gap: .4rem;
      background: none; border: 1.5px solid #ff7a00; color: #ff7a00;
      border-radius: 999px; padding: .42rem 1rem;
      font-family: inherit; font-size: .82rem; font-weight: 700;
      cursor: pointer; transition: all .18s;
    }
    .btn-alert:hover { background: #ff7a00; color: #fff; }
    .alert-popover {
      display: none; background: #fff; border-radius: 14px;
      box-shadow: 0 8px 28px rgba(0,0,0,.14); padding: 1.2rem 1.4rem;
      margin-top: .5rem; max-width: 420px; margin-left: auto;
    }
    .alert-popover.open { display: block; }
    .alert-popover h4 { font-size: .92rem; font-weight: 800; margin-bottom: .6rem; color: #111; }
    .alert-popover p  { font-size: .8rem; color: #666; margin-bottom: .8rem; }

    .alert-email-row input {
      flex: 1; border: 1.5px solid #e5e5e5; border-radius: 10px;
      padding: .55rem .85rem; font-family: inherit; font-size: .85rem;

    /* ── Multi-select district ── */

      display: flex; align-items: center; flex-wrap: wrap; gap: 5px;

      background: rgba(255,255,255,.08); border: none;
      border-radius: 10px; font-family: inherit; font-size: .9rem;

    }
    .ms-chip-rm {

    }
    .ms-chip-rm:hover { opacity: 1; }
    .ms-arrow { margin-left: auto; font-size: .72rem; opacity: .5; flex-shrink: 0; transition: transform .2s; }
    .ms-field.open .ms-arrow { transform: rotate(180deg); }
    .ms-dropdown {
      display: none; position: absolute; top: calc(100% + 6px); left: 0; min-width: 220px;
      background: #fff; border-radius: 12px; box-shadow: 0 8px 28px rgba(0,0,0,.18);
      z-index: 200; overflow: hidden;
    }
    .ms-field.open .ms-dropdown { display: block; }
    .ms-search {
      width: 100%; border: none; border-bottom: 1px solid #f0f0f0;
      padding: .6rem .85rem; font-family: inherit; font-size: .85rem;
      outline: none; color: #333;
    }
    .ms-options { max-height: 210px; overflow-y: auto; }
    .ms-opt {
      display: flex; align-items: center; gap: .6rem;
      padding: .52rem .85rem; cursor: pointer; font-size: .85rem; color: #333;

    .ms-opt:hover { background: #f8f9fa; }

    .ms-footer {

    .ms-clear:hover { color: #333; }

    }
    .similar-chip:hover { border-color: #ff7a00; color: #ff7a00; background: #fff8f0; }

  <script>
  /* ── Chips "Voir aussi dans" ── */
  function renderSimilarChips(filters) {
    const el = document.getElementById('similarChips');
    if (!el) return;
    const district = filters.district;
    if (!district || typeof SLCM_CONFIG === 'undefined') { el.innerHTML = ''; return; }
    const similar = SLCM_CONFIG.similarDistricts?.[district];
    if (!similar || !similar.length) { el.innerHTML = ''; return; }

    const chips = similar.map(d => {
      const url = new URL(window.location.href);
      url.searchParams.set('district', d);
      url.searchParams.delete('page');
      return `<a class="similar-chip" href="${url.toString()}">${d}</a>`;
    }).join('');

    el.innerHTML = `<div class="similar-wrap">
      <span class="similar-label">Voir aussi dans :</span>${chips}
    </div>`;
  }

  function shareSearch() {
    const url = window.location.href;
    navigator.clipboard.writeText(url).then(() => {
      const label = document.getElementById('shareLabel');
      label.textContent = 'Copié !';
      setTimeout(() => { label.textContent = 'Partager'; }, 2000);
    });
  }

  /* ══════════════════════════════════════
     SEO DYNAMIQUE — title, description, canonical, H1
     Mis à jour selon les filtres actifs
  ══════════════════════════════════════ */
  function updatePageSEO(filters) {
    /* Construire un libellé humain à partir des filtres */
    const typeLabels = {
      'apartment': 'appartements',
      'house': 'maisons',
      'studio': 'studios',
      'villa': 'villas',
      'duplex': 'duplex',
      'warehouse': 'entrepôts',
      'plots-of-land': 'terrains'
    };

    const modeLabel = filters.mode === 'sale' ? 'à vendre' : 'à louer';
    const typeLabel = typeLabels[filters.type] || 'biens immobiliers';
    const cityLabel = filters.city || 'Douala';
    const districtLabel = filters.district ? ` à ${filters.district}` : '';
    const bedroomsLabel = filters.bedrooms ? ` ${filters.bedrooms} chambres` : '';

    /* Composer le titre dynamique */
    let pageTitle, pageDesc, pageH1;

    if (!filters.city && !filters.type && !filters.district && !filters.bedrooms && !filters.price) {
      /* Cas "page sans filtre" */
      const modeWord = filters.mode === 'sale' ? 'à vendre' : 'à louer';
      pageTitle = `Annonces immobilières ${modeWord} à Douala — SE LOGER CM`;
      pageDesc = `Parcourez toutes les annonces immobilières ${modeWord} à Douala et au Cameroun : appartements, maisons, villas, studios. Annonces vérifiées par SE LOGER CM.`;
      pageH1 = `Toutes les annonces ${modeWord} à Douala`;
    } else {
      /* Cas "page filtrée" — construit titre richement */
      pageTitle = `${capitalize(typeLabel)}${bedroomsLabel} ${modeLabel} à ${cityLabel}${districtLabel} | SE LOGER CM`;
      pageDesc = `Découvrez les ${typeLabel}${bedroomsLabel} ${modeLabel} à ${cityLabel}${districtLabel} sur SE LOGER CM. Annonces vérifiées, contact direct propriétaires et agents immobiliers.`;
      pageH1 = `${capitalize(typeLabel)}${bedroomsLabel} ${modeLabel} à ${cityLabel}${districtLabel}`;
    }

    /* Tronquer si > 60 caractères pour title */
    if (pageTitle.length > 70) pageTitle = pageTitle.substring(0, 67) + '…';

    /* Mettre à jour les balises */
    document.title = pageTitle;

    const metaDesc = document.querySelector('meta[name="description"]');
    if (metaDesc) metaDesc.setAttribute('content', pageDesc);

    /* Canonical URL avec filtres */
    const canonicalUrl = buildCanonicalUrl(filters);
    let canonicalEl = document.querySelector('link[rel="canonical"]');
    if (!canonicalEl) {
      canonicalEl = document.createElement('link');
      canonicalEl.setAttribute('rel', 'canonical');
      document.head.appendChild(canonicalEl);
    }
    canonicalEl.setAttribute('href', canonicalUrl);

    /* Open Graph dynamique */
    const setOG = (prop, val) => {
      const el = document.querySelector(`meta[property="${prop}"]`);
      if (el) el.setAttribute('content', val);
    };
    setOG('og:title',       pageTitle);
    setOG('og:description', pageDesc);
    setOG('og:url',         canonicalUrl);

    /* Twitter Card dynamique */
    const setTW = (name, val) => {
      const el = document.querySelector(`meta[name="${name}"]`);
      if (el) el.setAttribute('content', val);
    };
    setTW('twitter:title',       pageTitle);
    setTW('twitter:description', pageDesc);

    /* H1 dynamique */
    const h1El = document.getElementById('pageH1');
    if (h1El) h1El.textContent = pageH1;
  }

  function capitalize(str) {
    if (!str) return '';
    return str.charAt(0).toUpperCase() + str.slice(1);
  }

  function buildCanonicalUrl(filters) {
    const url = new URL('https://selogercm.com/listings_v2.html');
    /* Conserver uniquement les filtres importants pour SEO */
    if (filters.mode && filters.mode !== 'rent') url.searchParams.set('mode', filters.mode);
    if (filters.city)     url.searchParams.set('city',     filters.city);
    if (filters.district) url.searchParams.set('district', filters.district);
    if (filters.type)     url.searchParams.set('type',     filters.type);
    if (filters.bedrooms) url.searchParams.set('bedrooms', filters.bedrooms);
    if (filters.price)    url.searchParams.set('price',    filters.price);
    /* page= n'est PAS canonical pour SEO (sinon duplicate) */
    return url.toString();
  }

  /* ══════════════════════════════════════
     SCHEMA.ORG — ItemList (CollectionPage)
     Aide Google à comprendre que c'est une liste de biens
  ══════════════════════════════════════ */
  function injectListingsSchema(listings, filters) {
    if (!listings || !listings.length) {
      /* Retire le schema si pas d'annonces */
      const existing = document.getElementById('schema-itemlist');
      if (existing) existing.remove();
      return;
    }

    const schema = {
      "@context": "https://schema.org",
      "@type": "CollectionPage",
      "name": document.title,
      "description": document.querySelector('meta[name="description"]')?.getAttribute('content') || '',
      "url": buildCanonicalUrl(filters),
      "mainEntity": {
        "@type": "ItemList",
        "numberOfItems": listings.length,
        "itemListElement": listings.slice(0, 10).map((listing, idx) => ({
          "@type": "ListItem",
          "position": idx + 1,
          "url": `https://selogercm.com/annonce/${listing.slug || listing.id}`,
          "name": listing.title || listing.title_fr || 'Annonce immobilière'
        }))
      }
    };

    let scriptEl = document.getElementById('schema-itemlist');
    if (!scriptEl) {
      scriptEl = document.createElement('script');
      scriptEl.type = 'application/ld+json';
      scriptEl.id = 'schema-itemlist';
      document.head.appendChild(scriptEl);
    }
    scriptEl.textContent = JSON.stringify(schema, null, 2);
  }

  document.addEventListener('DOMContentLoaded', async () => {
    const grid  = document.getElementById('resultsGrid');
    const empty = document.getElementById('emptyState');
    const form  = document.getElementById('searchForm');
    const params = new URLSearchParams(window.location.search);
    const urlMode = params.get('mode') || 'rent';

    /* Onglets location/vente */
    document.querySelectorAll('.seg-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.mode === urlMode);
      btn.addEventListener('click', () => {
        document.querySelectorAll('.seg-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        refreshPrices(btn.dataset.mode);
      });
    });

    /* ══ Multi-select district ══ */
    const citySel    = document.getElementById('city');
    let _districts   = [];   /* sélectionnés */

    function getDistrictList(city) {
      const cfg = typeof SLCM_CONFIG !== 'undefined' ? SLCM_CONFIG : null;
      return cfg?.cities[city] || cfg?.cities['Douala'] || [];
    }

    function renderOptions(filter) {
      const city = citySel?.value || 'Douala';
      const all  = getDistrictList(city);
      const q    = (filter || '').toLowerCase();
      const list = q ? all.filter(d => d.toLowerCase().includes(q)) : all;
      const el   = document.getElementById('districtOptions');
      if (!el) return;
      el.innerHTML = list.map(d => `
        <label class="ms-opt">
          <input type="checkbox" value="${d}" ${_districts.includes(d) ? 'checked' : ''}>
          ${d}
        </label>`).join('') || '<div style="padding:.6rem .85rem;color:#aaa;font-size:.82rem">Aucun résultat</div>';
      el.querySelectorAll('input[type=checkbox]').forEach(cb => {
        cb.addEventListener('change', () => {
          if (cb.checked) { if (!_districts.includes(cb.value)) _districts.push(cb.value); }
          else            { _districts = _districts.filter(d => d !== cb.value); }
          renderChips();
        });
      });
    }

    function renderChips() {
      const chipsEl      = document.getElementById('districtChips');
      const placeholder  = document.getElementById('districtPlaceholder');
      const countEl      = document.getElementById('districtCount');
      if (!chipsEl) return;
      if (_districts.length === 0) {
        placeholder.style.display = '';
        chipsEl.innerHTML = '';
        if (countEl) countEl.textContent = '';
      } else {
        placeholder.style.display = 'none';
        chipsEl.innerHTML = _districts.map(d =>
          `<span class="ms-chip">${d}<button class="ms-chip-rm" type="button" data-d="${d}" aria-label="Retirer ${d}">✕</button></span>`
        ).join('');
        if (countEl) countEl.textContent = _districts.length + ' sélectionné' + (_districts.length > 1 ? 's' : '');
        chipsEl.querySelectorAll('.ms-chip-rm').forEach(btn => {
          btn.addEventListener('click', (e) => {
            e.stopPropagation();
            _districts = _districts.filter(d => d !== btn.dataset.d);
            renderChips();
            renderOptions(document.getElementById('districtSearch')?.value);
          });
        });
      }
    }

    function openPicker() {
      const field = document.getElementById('districtField');
      const trigger = document.getElementById('districtTrigger');
      field?.classList.add('open');
      trigger?.setAttribute('aria-expanded', 'true');
      renderOptions();
      document.getElementById('districtSearch')?.focus();
    }
    function closePicker() {
      document.getElementById('districtField')?.classList.remove('open');
      document.getElementById('districtTrigger')?.setAttribute('aria-expanded', 'false');
    }

    document.getElementById('districtTrigger')?.addEventListener('click', (e) => {
      const field = document.getElementById('districtField');
      field?.classList.contains('open') ? closePicker() : openPicker();
    });
    document.getElementById('districtTrigger')?.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openPicker(); }
      if (e.key === 'Escape') closePicker();
    });
    document.getElementById('districtSearch')?.addEventListener('input', (e) => {
      renderOptions(e.target.value);
    });
    document.getElementById('districtClear')?.addEventListener('click', () => {
      _districts = []; renderChips();
      renderOptions(document.getElementById('districtSearch')?.value);
    });
    document.addEventListener('click', (e) => {
      if (!document.getElementById('districtField')?.contains(e.target)) closePicker();
    });

    function refreshDistricts() {
      _districts = [];
      renderChips();
      renderOptions();
    }

    /* Prix selon mode */
    function refreshPrices(mode) {
      const sel = document.getElementById('price');
      if (!sel || typeof SLCM_CONFIG === 'undefined') return;
      const ranges = SLCM_CONFIG.priceRanges[mode] || [];
      sel.innerHTML = '<option value="">Tous les prix</option>' +
        ranges.map(r => `<option value="${r.value}">${r.labelFR}</option>`).join('');
    }

    /* Pré-remplir depuis URL (district géré séparément via multi-select) */
    ['city','type','bedrooms','price'].forEach(k => {
      const el = document.getElementById(k);
      if (el && params.get(k)) el.value = params.get(k);
    });
    citySel.addEventListener('change', refreshDistricts);
    refreshDistricts();
    refreshPrices(urlMode);

    /* ── Pagination ── */
    const PER_PAGE = 12;
    let _allListings = [];
    let _currentPage = 1;
    let _currentFilters = {};

    function renderPage(page) {
      _currentPage = page;
      const total = _allListings.length;
      const totalPages = Math.ceil(total / PER_PAGE);
      const start = (page - 1) * PER_PAGE;
      const end   = Math.min(start + PER_PAGE, total);
      const slice = _allListings.slice(start, end);

      /* Grille */
      grid.innerHTML = slice.map(l => SLCM_listings.renderCard(l)).join('');

      /* Info */
      const infoEl = document.getElementById('paginationInfo');
      infoEl.style.display = 'block';
      infoEl.textContent = `${start + 1}–${end} sur ${total} annonce${total > 1 ? 's' : ''}`;

      /* Pagination */
      const pag = document.getElementById('pagination');
      if (totalPages <= 1) { pag.style.display = 'none'; return; }
      pag.style.display = 'flex';

      let html = `<button class="page-btn prev-next" onclick="goToPage(${page - 1})" ${page === 1 ? 'disabled' : ''}>
        <i class="fas fa-chevron-left"></i> Préc.
      </button>`;

      /* Pages numérotées avec ellipsis */
      const range = [];
      for (let i = 1; i <= totalPages; i++) {
        if (i === 1 || i === totalPages || (i >= page - 2 && i <= page + 2)) {
          range.push(i);
        } else if (range[range.length - 1] !== '...') {
          range.push('...');
        }
      }

      range.forEach(p => {
        if (p === '...') {
          html += `<span class="page-btn" style="cursor:default;border:none;color:#ccc">…</span>`;
        } else {
          html += `<button class="page-btn ${p === page ? 'active' : ''}" onclick="goToPage(${p})">${p}</button>`;
        }
      });

      html += `<button class="page-btn prev-next" onclick="goToPage(${page + 1})" ${page === totalPages ? 'disabled' : ''}>
        Suiv. <i class="fas fa-chevron-right"></i>
      </button>`;

      pag.innerHTML = html;

      /* Scroll vers le haut de la grille */
      document.querySelector('section').scrollIntoView({ behavior: 'smooth', block: 'start' });

      /* Mettre à jour l'URL avec la page */
      const url = new URL(window.location);
      url.searchParams.set('page', page);
      window.history.replaceState({}, '', url);
    }

    window.goToPage = function(page) {
      const totalPages = Math.ceil(_allListings.length / PER_PAGE);
      if (page < 1 || page > totalPages) return;
      renderPage(page);
    };

    /* Charger et afficher */
    async function loadAndRender(filters) {
      _currentFilters = filters;

      grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:3rem;color:#aaa">
        <i class="fas fa-spinner fa-spin" style="font-size:1.5rem"></i>
        <p style="margin-top:.75rem">Chargement des annonces…</p></div>`;
      empty.style.display = 'none';
      document.getElementById('pagination').style.display = 'none';
      document.getElementById('paginationInfo').style.display = 'none';

      /* ── SEO dynamique : MAJ title, description, canonical, H1 ── */
      updatePageSEO(filters);

      _allListings = await SLCM_listings.getListings(filters);

      /* ── Schema.org ItemList ── */
      injectListingsSchema(_allListings, filters);

      renderSimilarChips(filters);

      if (!_allListings.length) {
        grid.innerHTML = '';
        empty.style.display = 'block';
        return;
      }

      /* Lire la page depuis l'URL si présente */
      const urlPage = parseInt(new URL(window.location).searchParams.get('page')) || 1;
      renderPage(urlPage);
    }

    /* Masquer le filtre Meublé en mode Vente */
    function syncFurnishedVisibility(mode) {
      const el = document.getElementById('furnishedField');
      if (el) el.style.display = mode === 'sale' ? 'none' : '';
    }
    document.querySelectorAll('.seg-btn').forEach(btn => {
      btn.addEventListener('click', () => syncFurnishedVisibility(btn.dataset.mode));
    });
    syncFurnishedVisibility(urlMode);

    /* Construire l'objet filters depuis le formulaire */
    function buildFilters() {
      const mode      = document.querySelector('.seg-btn.active')?.dataset.mode || 'rent';
      const furnished = document.getElementById('furnished').value;
      return {
        mode,
        city:      citySel.value,
        district:  _districts.length > 0 ? _districts : undefined,
        type:      document.getElementById('type').value,
        bedrooms:  document.getElementById('bedrooms').value,
        price:     document.getElementById('price').value,
        furnished: furnished === 'true' ? true : furnished === 'false' ? false : undefined,
        sort:      document.getElementById('sort').value,
      };
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const filters = buildFilters();

      /* Encoder dans l'URL */
      const url = new URL(window.location);
      url.searchParams.delete('page');
      url.searchParams.delete('district');
      if (_districts.length > 0) url.searchParams.set('district', _districts.join(','));
      const extra = {
        mode: filters.mode, city: filters.city,
        type: filters.type, bedrooms: filters.bedrooms,
        price: filters.price,
        furnished: document.getElementById('furnished').value,
        sort: filters.sort,
      };
      Object.entries(extra).forEach(([k, v]) => {
        if (v !== undefined && v !== '') url.searchParams.set(k, v);
        else url.searchParams.delete(k);
      });
      window.history.pushState({}, '', url);

      await loadAndRender(filters);
    });

    /* Chargement initial — restaurer districts depuis URL (format: Bali,Bonapriso) */
    const furnishedParam  = params.get('furnished');
    const districtParam   = params.get('district');
    if (districtParam) {
      _districts = districtParam.split(',').map(d => d.trim()).filter(Boolean);
      renderChips();
    }
    if (params.get('sort'))      document.getElementById('sort').value      = params.get('sort');
    if (furnishedParam)          document.getElementById('furnished').value = furnishedParam;

    await loadAndRender({
      mode:      urlMode,
      city:      params.get('city')  || '',
      district:  _districts.length > 0 ? _districts : undefined,
      type:      params.get('type')  || '',
      bedrooms:  params.get('bedrooms') || '',
      price:     params.get('price') || '',
      furnished: furnishedParam === 'true' ? true : furnishedParam === 'false' ? false : undefined,
      sort:      params.get('sort')  || '',
    });
    /* Reset page à 1 lors d'une nouvelle recherche */
    form.addEventListener('submit', () => {
      const url = new URL(window.location);
      url.searchParams.delete('page');
      window.history.replaceState({}, '', url);
    }, { capture: true });

    /* ══ Alerte recherche ══ */
    const btnAlert     = document.getElementById('btnAlert');
    const alertPopover = document.getElementById('alertPopover');
    const alertDescEl  = document.getElementById('alertDesc');
    const alertMsg     = document.getElementById('alertMsg');

    btnAlert?.addEventListener('click', () => {
      const open = alertPopover.classList.toggle('open');
      if (open && _currentFilters) {
        const parts = [];
        if (_currentFilters.mode)     parts.push(_currentFilters.mode === 'rent' ? 'À louer' : 'À vendre');
        if (Array.isArray(_currentFilters.district) && _currentFilters.district.length)
          parts.push(_currentFilters.district.join(', '));
        else if (_currentFilters.district) parts.push(_currentFilters.district);
        if (_currentFilters.type)     parts.push(_currentFilters.type);
        if (_currentFilters.city)     parts.push(_currentFilters.city);
        if (_currentFilters.bedrooms) parts.push(_currentFilters.bedrooms + ' ch.');
        alertDescEl.textContent = parts.join(' · ') || 'Toutes les annonces';
      }
    });

    document.addEventListener('click', (e) => {
      if (!alertPopover.contains(e.target) && e.target !== btnAlert)
        alertPopover.classList.remove('open');
    });

    document.getElementById('alertSubmit')?.addEventListener('click', async () => {
      const email = document.getElementById('alertEmail').value.trim();
      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        alertMsg.textContent = 'Email invalide.'; alertMsg.className = 'alert-msg err'; return;
      }
      alertMsg.textContent = '…'; alertMsg.className = 'alert-msg';

      let tries = 0;
      while ((!window.SLCM_DB?.client) && tries < 30) {
        await new Promise(r => setTimeout(r, 100)); tries++;
      }
      if (!window.SLCM_DB?.client) {
        alertMsg.textContent = 'Connexion impossible.'; alertMsg.className = 'alert-msg err'; return;
      }

      const f = _currentFilters || {};
      const districts = Array.isArray(f.district) ? f.district : (f.district ? [f.district] : []);

      const { error } = await window.SLCM_DB.client.from('saved_searches').insert({
        email,
        mode:      f.mode      || null,
        city:      f.city      || null,
        districts,
        type:      f.type      || null,
        bedrooms:  f.bedrooms  ? parseInt(f.bedrooms) : null,
        price:     f.price     || null,
        furnished: f.furnished !== undefined ? f.furnished : null,
      });

      if (error) {
        alertMsg.textContent = 'Erreur : ' + error.message;
        alertMsg.className = 'alert-msg err';
      } else {
        alertMsg.textContent = '✅ Alerte créée ! Vous recevrez un email dès qu\'une annonce correspond.';
        alertMsg.className = 'alert-msg ok';
        document.getElementById('alertEmail').value = '';
        setTimeout(() => alertPopover.classList.remove('open'), 3000);
      }
    });
  });
  </script>
  <script src="assets/js/cookies.js" defer></script>
</body>
