[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

# ── Headers ──

[[headers]]
  for = "/sitemap-listings.xml"
  [headers.values]
    Cache-Control = "public, max-age=7200, stale-while-revalidate=86400"
    Content-Type = "application/xml; charset=utf-8"

[[headers]]
  for = "/assets/img/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/css/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "/assets/js/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "/assets/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/favicon.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=300, stale-while-revalidate=86400"

[[headers]]
  for = "/share/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' cdn.jsdelivr.net cdnjs.cloudflare.com www.googletagmanager.com www.google-analytics.com api.emailjs.com embed.cloudflarestream.com; style-src 'self' 'unsafe-inline' fonts.googleapis.com cdnjs.cloudflare.com; font-src 'self' fonts.gstatic.com cdnjs.cloudflare.com; img-src 'self' https: data: blob:; media-src 'self' https: blob:; connect-src 'self' *.supabase.co wss://*.supabase.co api.emailjs.com www.google-analytics.com www.googletagmanager.com videodelivery.net *.videodelivery.net imagedelivery.net *.imagedelivery.net cdn.jsdelivr.net embed.cloudflarestream.com upload.cloudflarestream.com *.cloudflarestream.com; frame-src https://www.google.com https://maps.google.com https://maps.googleapis.com https://www.youtube.com https://iframe.videodelivery.net; worker-src blob:; object-src 'none'; base-uri 'self';"

[[headers]]
  for = "/.netlify/functions/public-config"
  [headers.values]
    Cache-Control = "public, max-age=3600, stale-while-revalidate=86400"

[[headers]]
  for = "/.netlify/functions/homepage-listings"
  [headers.values]
    Cache-Control = "public, max-age=300, stale-while-revalidate=3600"

[[headers]]
  for = "/.netlify/functions/listing-seo"
  [headers.values]
    Cache-Control = "public, max-age=300, stale-while-revalidate=3600"

[[headers]]
  for = "/.netlify/functions/og"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Cache-Control = "public, max-age=3600, stale-while-revalidate=86400"
