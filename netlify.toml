[build]
  publish = "."

[build.environment]
  NODE_VERSION = "18"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[functions."send-alerts"]
  schedule = "0 */6 * * *"

[functions."cron-expire"]
  schedule = "0 2 * * *"

[functions."cron-relance"]
  schedule = "0 8 * * *"

[functions."cron-cleanup"]
  schedule = "0 3 * * 0"


# ── Pages principales ─────────────────────────────────────────
[[redirects]]
  from = "/pricing"
  to = "/pricing.html"
  status = 200

[[redirects]]
  from = "/favorites"
  to = "/favorites.html"
  status = 200

[[redirects]]
  from = "/douala"
  to = "/douala.html"
  status = 200

# ── Routing annonces ──────────────────────────────────────────
[[redirects]]
  from = "/annonce"
  to = "/listing_detail.html"
  status = 200

# ── Pages SEO par quartier / type ─────────────────────────────
[[redirects]]
  from = "/appartements-bonapriso"
  to = "/seo-landing.html"
  status = 200

[[redirects]]
  from = "/appartements-bali"
  to = "/seo-landing.html"
  status = 200

[[redirects]]
  from = "/appartements-bonanjo"
  to = "/seo-landing.html"
  status = 200

[[redirects]]
  from = "/studios-bali"
  to = "/seo-landing.html"
  status = 200

[[redirects]]
  from = "/studios-bonapriso"
  to = "/seo-landing.html"
  status = 200

[[redirects]]
  from = "/villas-a-louer-douala"
  to = "/seo-landing.html"
  status = 200

[[redirects]]
  from = "/maisons-a-louer-douala"
  to = "/seo-landing.html"
  status = 200

[[redirects]]
  from = "/appartements-meubles-douala"
  to = "/seo-landing.html"
  status = 200

[[redirects]]
  from = "/terrains-a-vendre-bonapriso"
  to = "/seo-landing.html"
  status = 200

[[redirects]]
  from = "/appartements-bonamoussadi"
  to = "/seo-landing.html"
  status = 200

# ── Partage réseaux sociaux ──────────────────────────────────
[[redirects]]
  from = "/share/*"
  to = "/.netlify/functions/og"
  status = 200
  force = true
# ── Sitemap listings (annonces dynamiques) ─────────────────────
[[redirects]]
  from = "/sitemap-listings.xml"
  to = "/.netlify/functions/sitemap-listings"
  status = 200

# ── Headers pour sitemap dynamique ─────────────────────────────
[[headers]]
  for = "/sitemap-listings.xml"
  [headers.values]
    Cache-Control = "public, max-age=7200, stale-while-revalidate=86400"
    Content-Type = "application/xml; charset=utf-8"

# ── Cache statique : assets versionnés (JS/CSS/images) ───────
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Cache HTML court (mise à jour fréquente) ─────────────────
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=300, stale-while-revalidate=86400"

# ── Pas de cache sur les routes dynamiques ────────────────────
[[headers]]
  for = "/share/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' cdn.jsdelivr.net cdnjs.cloudflare.com www.googletagmanager.com www.google-analytics.com api.emailjs.com; style-src 'self' 'unsafe-inline' fonts.googleapis.com cdnjs.cloudflare.com; font-src 'self' fonts.gstatic.com cdnjs.cloudflare.com; img-src 'self' https: data: blob:; media-src 'self' https: blob:; connect-src 'self' *.supabase.co api.emailjs.com www.google-analytics.com www.googletagmanager.com videodelivery.net *.videodelivery.net imagedelivery.net; frame-src https://www.google.com https://maps.google.com https://www.youtube.com https://iframe.videodelivery.net; worker-src blob:;"

[[headers]]
  for = "/.netlify/functions/homepage-listings"
  [headers.values]
    Cache-Control = "public, max-age=300, stale-while-revalidate=3600"

[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Cache-Control = "public, max-age=3600, stale-while-revalidate=86400"
