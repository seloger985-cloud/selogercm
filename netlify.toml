[build]
  publish = "."

[build.environment]
  NODE_VERSION = "18"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  included_files = ["listing_detail.html"]

[functions."send-alerts"]
  schedule = "0 */6 * * *"

[functions."cron-expire"]
  schedule = "0 2 * * *"

[functions."cron-relance"]
  schedule = "0 8 * * *"

[functions."cron-cleanup"]
  schedule = "0 3 * * 0"

# ── Canonique : apex selogercm.com (sans www) ──
[[redirects]]
  from = "https://www.selogercm.com/*"
  to = "https://selogercm.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.selogercm.com/*"
  to = "https://selogercm.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://selogercm.com/*"
  to = "https://selogercm.com/:splat"
  status = 301
  force = true

