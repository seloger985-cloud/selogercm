<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <title>Nouveau mot de passe — SE LOGER CM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root { --orange: #ff7a00; }
    body {
      background: linear-gradient(135deg, #ff9966, #ff5e62);
      display: flex; flex-direction: column;
      min-height: 100vh; font-family: 'Poppins', sans-serif;
      margin: 0;
    }
    main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem; }
    .box {
      background: #fff; border-radius: 20px;
      box-shadow: 0 12px 40px rgba(0,0,0,.15);
      padding: 2.5rem; width: 100%; max-width: 420px;
    }
    .logo { text-align: center; margin-bottom: 1.5rem; }
    .logo span { font-size: 1.3rem; font-weight: 800; color: #111; }
    .logo span em { color: var(--orange); font-style: normal; }
    h2 { font-size: 1.2rem; font-weight: 800; color: #111; margin: 0 0 .5rem; }
    p  { font-size: .88rem; color: #666; margin: 0 0 1.5rem; line-height: 1.6; }
    .field { margin-bottom: 1rem; }
    .field label { display: block; font-size: .78rem; font-weight: 700; color: #666; margin-bottom: .35rem; text-transform: uppercase; }
    .field input {
      width: 100%; padding: .75rem 1rem; border: 1.5px solid #e5e5e5;
      border-radius: 10px; font-family: inherit; font-size: .95rem;
      transition: border-color .2s; background: #fafafa; box-sizing: border-box;
    }
    .field input:focus { outline: none; border-color: var(--orange); background: #fff; }
    .btn {
      width: 100%; padding: .9rem; border: none; border-radius: 12px;
      background: var(--orange); color: #fff; font-family: inherit;
      font-size: 1rem; font-weight: 800; cursor: pointer;
      transition: opacity .2s; margin-top: .5rem;
    }
    .btn:hover { opacity: .88; }
    .btn:disabled { opacity: .6; cursor: not-allowed; }
    .success-msg { color: #128c47; font-size: .85rem; margin-top: .75rem; text-align: center; min-height: 1.2rem; }
    .error-msg   { color: #c00;    font-size: .85rem; margin-top: .75rem; text-align: center; min-height: 1.2rem; }
    .strength-bar { height: 4px; border-radius: 2px; background: #eee; margin-top: .4rem; overflow: hidden; }
    .strength-fill { height: 100%; border-radius: 2px; transition: width .3s, background .3s; width: 0; }
  </style>
</head>
<body>
  <main>
    <div class="box">
      <div class="logo">
        <span>SE <em>LOGER</em> CM</span>
      </div>

      <div id="formPanel">
        <h2>Nouveau mot de passe 🔐</h2>
        <p>Choisissez un nouveau mot de passe sécurisé pour votre compte.</p>

        <div class="field">
          <label>Nouveau mot de passe</label>
          <input id="newPass" type="password" placeholder="8 caractères minimum" required>
          <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
        </div>
        <div class="field">
          <label>Confirmer le mot de passe</label>
          <input id="confirmPass" type="password" placeholder="Répétez votre mot de passe" required>
        </div>

        <button class="btn" id="resetBtn">
          <i class="fas fa-lock"></i> Enregistrer le mot de passe
        </button>
        <div class="error-msg"   id="errorMsg"></div>
        <div class="success-msg" id="successMsg"></div>
      </div>

      <div id="successPanel" style="display:none;text-align:center">
        <div style="font-size:3rem;margin-bottom:1rem">✅</div>
        <h2>Mot de passe mis à jour !</h2>
        <p>Votre mot de passe a été modifié avec succès.</p>
        <a href="/connexion" class="btn" style="display:block;text-decoration:none;text-align:center;margin-top:1rem">
          <i class="fas fa-sign-in-alt"></i> Se connecter
        </a>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="assets/js/supabase.js"></script>
  <script>
  /* Indicateur de force du mot de passe */
  document.getElementById('newPass').addEventListener('input', function() {
    const val = this.value;
    const fill = document.getElementById('strengthFill');
    let strength = 0;
    if (val.length >= 8) strength++;
    if (/[A-Z]/.test(val)) strength++;
    if (/[0-9]/.test(val)) strength++;
    if (/[^A-Za-z0-9]/.test(val)) strength++;
    const colors = ['#e24b4a', '#e65100', '#f9a825', '#2e7d32'];
    const widths  = ['25%', '50%', '75%', '100%'];
    fill.style.width      = strength ? widths[strength-1] : '0';
    fill.style.background = strength ? colors[strength-1] : '#eee';
  });

  document.getElementById('resetBtn').addEventListener('click', async () => {
    const newPass     = document.getElementById('newPass').value.trim();
    const confirmPass = document.getElementById('confirmPass').value.trim();
    const errEl       = document.getElementById('errorMsg');
    const okEl        = document.getElementById('successMsg');
    const btn         = document.getElementById('resetBtn');
    errEl.textContent = ''; okEl.textContent = '';

    if (newPass.length < 8) { errEl.textContent = 'Le mot de passe doit contenir au moins 8 caractères.'; return; }
    if (newPass !== confirmPass) { errEl.textContent = 'Les mots de passe ne correspondent pas.'; return; }

    btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Mise à jour...';

    try {
      let tries = 0;
      while ((!window.SLCM_DB || !window.SLCM_DB.client) && tries < 30) {
        await new Promise(r => setTimeout(r, 100)); tries++;
      }
      const { error } = await window.SLCM_DB.client.auth.updateUser({ password: newPass });
      if (error) {
        errEl.textContent = 'Erreur : ' + error.message;
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-lock"></i> Enregistrer le mot de passe';
      } else {
        document.getElementById('formPanel').style.display    = 'none';
        document.getElementById('successPanel').style.display = 'block';
      }
    } catch(e) {
      errEl.textContent = 'Une erreur est survenue. Réessayez.';
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-lock"></i> Enregistrer le mot de passe';
    }
  });
  </script>
</body>
</html>
