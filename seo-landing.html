  <script>
  document.addEventListener('DOMContentLoaded', async () => {
    const wrap = document.getElementById('seoContent');

    if (!page) {

    /* ── Breadcrumb ── */
    const breadcrumb = `<div class="breadcrumb">
      <a href="/">Accueil</a><span>/</span>
      <a href="/listings_v2.html?mode=${page.mode}">Annonces</a><span>/</span>
      <strong style="color:#111">${page.h1}</strong>
    </div>`;

    /* ── Hero ── */
    const hero = `<div class="seo-hero">
      <p class="seo-kicker"><i class="fas fa-map-marker-alt"></i> ${page.kicker}</p>
      <h1 class="seo-h1">${page.h1}</h1>
      <p class="seo-intro">${page.intro}</p>
    </div>`;

    /* ── Navigation similaire ── */
    const similar = `<div class="similar-nav">
      <span style="font-size:.78rem;font-weight:700;color:#aaa;align-self:center">Voir aussi :</span>
      ${page.similar.map(s => `<a href="${s.href}">${s.label}</a>`).join('')}
    </div>`;

    /* ── Squelette ── */
    wrap.innerHTML = breadcrumb + hero + similar
      + `<p class="seo-listings-title">Annonces disponibles</p>`
      + `<div id="seoGrid" class="seo-grid"><div style="grid-column:1/-1;text-align:center;color:#aaa;padding:2rem"><i class="fas fa-spinner fa-spin"></i></div></div>`
      + `<div class="seo-body"><h2>Le quartier ${page.district} en détail</h2><p>${page.body}</p></div>`
      + `<a href="${page.cta}" class="seo-cta"><i class="fas fa-search"></i> ${page.ctaLabel}</a>`;

    /* ── Schema.org ── */
    document.getElementById('schema-seo').textContent = JSON.stringify({
      "@context": "https://schema.org",
      "@type": "CollectionPage",
      "name": page.title,
      "description": page.desc,
      "url": "https://www.selogercm.com/" + slug,
      "provider": { "@type": "RealEstateAgent", "name": "SE LOGER CM" }
    });

    /* ── Open Graph dynamique ── */
    document.querySelector('meta[property="og:title"]')?.setAttribute('content', page.title);
    document.querySelector('meta[property="og:description"]')?.setAttribute('content', page.desc);

    /* ── Charger les annonces Supabase ── */
    let tries = 0;
    while ((!window.SLCM_DB?.client || !window.SLCM_listings) && tries < 50) {
      await new Promise(r => setTimeout(r, 100)); tries++;
    }

    const grid = document.getElementById('seoGrid');
    if (!grid) return;

    if (!window.SLCM_listings) {
      grid.innerHTML = `<p style="grid-column:1/-1;text-align:center;color:#aaa">Chargement impossible.</p>`;
      return;
    }

    let listings = await window.SLCM_listings.getListings({
      mode:      page.mode,
      type:      page.type      || undefined,
      district:  page.district  || undefined,
      furnished: page.furnished !== undefined ? page.furnished : undefined,
    });

    /* Fallback 1 : même mode + même type, sans filtre quartier */
    if (!listings.length && page.district) {
      listings = await window.SLCM_listings.getListings({
        mode: page.mode,
        type: page.type || undefined,
      });
    }

    /* Fallback 2 : même mode uniquement */
    if (!listings.length) {
      listings = await window.SLCM_listings.getListings({ mode: page.mode });
    }

    if (!listings.length) {
      grid.innerHTML = `<p style="grid-column:1/-1;text-align:center;color:#aaa;padding:1.5rem">
        Aucune annonce disponible pour le moment. <a href="${page.cta}" style="color:#ff7a00;font-weight:700">Voir toutes les annonces →</a>
      </p>`;
      return;
    }

    grid.innerHTML = listings.slice(0, 6).map(l => window.SLCM_listings.renderCard(l)).join('');
  });
  </script>
</body>
</html>
