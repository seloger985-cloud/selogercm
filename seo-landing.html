  /* ── Résolution du slug depuis l'URL ── */

  if (page) {
    document.title = page.title;
    document.querySelector('meta[name="description"]')?.setAttribute('content', page.desc);

  <!-- Open Graph -->
  <meta property="og:type"      content="website">

  <style>
    body { background: #f6f7f9; }
    .seo-wrap { max-width: 1100px; margin: auto; padding: 2rem 1.2rem 4rem; }
    .breadcrumb { font-size: .82rem; color: #888; margin-bottom: 1.5rem; display: flex; gap: .4rem; align-items: center; flex-wrap: wrap; }
    .breadcrumb a { color: #888; text-decoration: none; } .breadcrumb a:hover { color: #ff7a00; }
    .breadcrumb span { color: #ccc; }
    .seo-hero { margin-bottom: 2rem; }
    .seo-kicker { font-size: .78rem; font-weight: 800; color: #ff7a00; text-transform: uppercase; letter-spacing: 1px; margin-bottom: .4rem; }
    .seo-h1 { font-size: clamp(1.5rem, 4vw, 2.2rem); font-weight: 900; color: #111; margin-bottom: 1rem; line-height: 1.2; }
    .seo-intro { font-size: 1rem; color: #444; line-height: 1.7; max-width: 720px; margin-bottom: 1.5rem; }
    .similar-nav { display: flex; gap: .5rem; flex-wrap: wrap; margin-bottom: 2rem; }
    .similar-nav a { background: #fff; border: 1.5px solid #e5e5e5; color: #444; border-radius: 999px; padding: .38rem .9rem; font-size: .82rem; font-weight: 700; text-decoration: none; transition: all .18s; }
    .similar-nav a:hover { border-color: #ff7a00; color: #ff7a00; }
    .seo-listings-title { font-size: 1.1rem; font-weight: 800; color: #111; margin-bottom: 1rem; }
    .seo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.2rem; margin-bottom: 2rem; }
    .seo-body { background: #fff; border-radius: 16px; padding: 1.6rem; box-shadow: 0 4px 16px rgba(0,0,0,.06); margin-bottom: 2rem; }
    .seo-body h2 { font-size: 1rem; font-weight: 800; color: #111; margin-bottom: .75rem; }
    .seo-body p { font-size: .95rem; color: #555; line-height: 1.7; }
    .seo-cta { display: inline-flex; align-items: center; gap: .5rem; background: #ff7a00; color: #fff; border-radius: 999px; padding: .75rem 1.6rem; font-weight: 800; text-decoration: none; font-size: .95rem; transition: opacity .2s; }
    .seo-cta:hover { opacity: .88; }
    .seo-404 { text-align: center; padding: 4rem 1rem; color: #888; }
    .seo-404 h1 { font-size: 1.4rem; font-weight: 800; color: #111; margin-bottom: .75rem; }
    @media (max-width: 600px) { .seo-h1 { font-size: 1.4rem; } }

    /* Schema.org JSON-LD injecté dynamiquement */
  </style>

  <!-- Schema.org (injecté par JS ci-dessous) -->
  <script id="schema-seo" type="application/ld+json">{}</script>
</head>
<body>
  <header>
    <div class="container px navbar">
      <a class="brand" href="/">
        <img src="/assets/img/logo.png" alt="SE LOGER CM">
        <span>SE LOGER CM</span>
      </a>
      <div class="nav-right">
        <a href="/listings_v2.html" class="btn-primary">Voir les annonces</a>
      </div>
    </div>
  </header>

  <main>
    <div class="seo-wrap" id="seoContent">
      <!-- Rendu par JS ci-dessous -->
    </div>
  </main>

  <footer></footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js" defer></script>
  <script src="/assets/js/supabase.js" defer></script>
  <script src="/assets/js/config.js"></script>
  <script src="/assets/js/listings.js" defer></script>
  <script src="/assets/js/footer.js" defer></script>
  <script src="/assets/js/nav.js" defer></script>
  <script src="/assets/js/favorites.js" defer></script>

  <script>
  document.addEventListener('DOMContentLoaded', async () => {
    const wrap = document.getElementById('seoContent');

    if (!page) {
      wrap.innerHTML = `<div class="seo-404">
        <h1>Page introuvable</h1>
        <p>Cette page n'existe pas. <a href="/listings_v2.html" style="color:#ff7a00;font-weight:700">Voir toutes les annonces →</a></p>
      </div>`;
      return;
    }

    /* ── Breadcrumb ── */
    const breadcrumb = `<div class="breadcrumb">
      <a href="/">Accueil</a><span>/</span>
      <a href="/listings_v2.html?mode=${page.mode}">Annonces</a><span>/</span>
      <strong style="color:#111">${page.h1}</strong>
    </div>`;

    /* ── Hero ── */
    const hero = `<div class="seo-hero">
      <p class="seo-kicker"><i class="fas fa-map-marker-alt"></i> ${page.kicker}</p>
      <h1 class="seo-h1">${page.h1}</h1>
      <p class="seo-intro">${page.intro}</p>
    </div>`;

    /* ── Navigation similaire ── */
    const similar = `<div class="similar-nav">
      <span style="font-size:.78rem;font-weight:700;color:#aaa;align-self:center">Voir aussi :</span>
      ${page.similar.map(s => `<a href="${s.href}">${s.label}</a>`).join('')}
    </div>`;

    /* ── Squelette ── */
    wrap.innerHTML = breadcrumb + hero + similar
      + `<p class="seo-listings-title">Annonces disponibles</p>`
      + `<div id="seoGrid" class="seo-grid"><div style="grid-column:1/-1;text-align:center;color:#aaa;padding:2rem"><i class="fas fa-spinner fa-spin"></i></div></div>`
      + `<div class="seo-body"><h2>Le quartier ${page.district} en détail</h2><p>${page.body}</p></div>`
      + `<a href="${page.cta}" class="seo-cta"><i class="fas fa-search"></i> ${page.ctaLabel}</a>`;

    /* ── Schema.org ── */
    document.getElementById('schema-seo').textContent = JSON.stringify({
      "@context": "https://schema.org",
      "@type": "CollectionPage",
      "name": page.title,
      "description": page.desc,
      "url": "https://www.selogercm.com/" + slug,
      "provider": { "@type": "RealEstateAgent", "name": "SE LOGER CM" }
    });

    /* ── Open Graph dynamique ── */
    document.querySelector('meta[property="og:title"]')?.setAttribute('content', page.title);
    document.querySelector('meta[property="og:description"]')?.setAttribute('content', page.desc);

    /* ── Charger les annonces Supabase ── */
    let tries = 0;
    while ((!window.SLCM_DB?.client || !window.SLCM_listings) && tries < 50) {
      await new Promise(r => setTimeout(r, 100)); tries++;
    }

    const grid = document.getElementById('seoGrid');
    if (!grid) return;

    if (!window.SLCM_listings) {
      grid.innerHTML = `<p style="grid-column:1/-1;text-align:center;color:#aaa">Chargement impossible.</p>`;
      return;
    }

    const listings = await window.SLCM_listings.getListings({
      mode: page.mode, type: page.type, district: page.district
    });

    if (!listings.length) {
      grid.innerHTML = `<p style="grid-column:1/-1;text-align:center;color:#aaa;padding:1.5rem">
        Aucune annonce disponible pour le moment. <a href="${page.cta}" style="color:#ff7a00;font-weight:700">Voir toutes les annonces →</a>
      </p>`;
      return;
    }

    grid.innerHTML = listings.slice(0, 6).map(l => window.SLCM_listings.renderCard(l)).join('');
  });
  </script>
</body>
</html>
